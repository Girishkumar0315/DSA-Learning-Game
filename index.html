<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>DSA LEGENDS — World of Algorithms</title>
<meta name="description" content="Master Data Structures & Algorithms through an epic RPG adventure. Boss battles, quizzes, and interactive missions.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Rajdhani:wght@400;500;600;700&family=JetBrains+Mono:wght@400;700&family=Cinzel:wght@700;900&family=Cinzel+Decorative:wght@700;900&display=swap" rel="stylesheet">
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
:root{
  --void:#05060d; --void2:#0a0d1c; --panel:rgba(18,22,46,.55);
  --blue:#2dd4ff; --purple:#b14dff; --green:#39ff9e; --pink:#ff4d9d; --gold:#ffd166;
  --txt:#e8ecff; --dim:#8a93c4; --line:rgba(120,140,255,.18);
  --glow-b:0 0 18px rgba(45,212,255,.55); --glow-p:0 0 18px rgba(177,77,255,.55);
  --glow-g:0 0 18px rgba(57,255,158,.55);
  --display:'Orbitron', system-ui, sans-serif;
  --body:'Rajdhani', system-ui, sans-serif;
  --mono:'JetBrains Mono', ui-monospace, monospace;
}
*{box-sizing:border-box; margin:0; padding:0}
html,body{height:100%}
body{
  font-family:var(--body); color:var(--txt); background:var(--void);
  overflow:hidden; -webkit-font-smoothing:antialiased; user-select:none;
}
#bg{position:fixed; inset:0; z-index:0}
#app{position:relative; z-index:2; height:100vh; display:flex; flex-direction:column}
button{font-family:var(--body); cursor:pointer; color:var(--txt); border:none; background:none}
::-webkit-scrollbar{width:8px} ::-webkit-scrollbar-thumb{background:var(--purple); border-radius:8px}

/* ---------- buttons / chips ---------- */
.btn{
  position:relative; padding:12px 26px; font-family:var(--display); font-weight:700;
  letter-spacing:2px; text-transform:uppercase; font-size:13px; border-radius:12px;
  background:linear-gradient(135deg,rgba(45,212,255,.18),rgba(177,77,255,.18));
  border:1px solid var(--blue); color:#eaffff; box-shadow:var(--glow-b);
  transition:.18s transform,.18s box-shadow, .18s filter;
}
.btn:hover{transform:translateY(-2px); box-shadow:0 0 30px rgba(45,212,255,.85); filter:brightness(1.15)}
.btn:active{transform:translateY(0)}
.btn.purple{border-color:var(--purple); box-shadow:var(--glow-p)}
.btn.green{border-color:var(--green); box-shadow:var(--glow-g); color:#eafff4}
.btn.ghost{background:rgba(255,255,255,.03); border-color:var(--line); box-shadow:none; letter-spacing:1px}
.btn.ghost:hover{box-shadow:0 0 18px rgba(120,140,255,.4)}
.btn:disabled{opacity:.4; filter:grayscale(.6); cursor:not-allowed}
.btn.sm{padding:8px 16px; font-size:11px}

.glass{
  background:var(--panel); border:1px solid var(--line); border-radius:18px;
  backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px);
  box-shadow:inset 0 1px 0 rgba(255,255,255,.06), 0 20px 50px rgba(0,0,0,.45);
}
.eyebrow{font-family:var(--mono); font-size:11px; letter-spacing:3px; color:var(--blue); text-transform:uppercase}
.title{font-family:var(--display); font-weight:900; letter-spacing:1px}
.dim{color:var(--dim)}

/* ---------- top HUD ---------- */
#hud{display:flex; align-items:center; gap:18px; padding:12px 20px; border-bottom:1px solid var(--line);
  background:linear-gradient(180deg,rgba(10,13,28,.85),rgba(10,13,28,.2)); backdrop-filter:blur(8px); flex:0 0 auto}
#hud.hidden{display:none}
.hud-ava{width:46px;height:46px;border-radius:12px;display:grid;place-items:center;font-size:24px;
  background:radial-gradient(circle at 30% 30%,rgba(177,77,255,.5),rgba(45,212,255,.25)); border:1px solid var(--purple); box-shadow:var(--glow-p)}
.hud-name{font-family:var(--display); font-weight:700; font-size:15px; letter-spacing:1px}
.hud-rank{font-size:12px; color:var(--gold); letter-spacing:1px; font-weight:600}
.xpwrap{flex:1; max-width:340px}
.xpbar{height:9px; border-radius:9px; background:rgba(255,255,255,.07); overflow:hidden; border:1px solid var(--line)}
.xpfill{height:100%; width:0; background:linear-gradient(90deg,var(--blue),var(--purple)); box-shadow:var(--glow-b); transition:width .6s cubic-bezier(.2,.8,.2,1)}
.xptext{font-family:var(--mono); font-size:10px; color:var(--dim); margin-top:3px; display:flex; justify-content:space-between}
.stat{display:flex; align-items:center; gap:7px; font-family:var(--mono); font-weight:700; font-size:14px}
.stat .ic{font-size:16px}
.coins{color:var(--gold)} .lvl{color:var(--green)}

/* ---------- screens ---------- */
#stage{flex:1; position:relative; overflow:hidden}
.screen{position:absolute; inset:0; padding:26px; overflow-y:auto; opacity:0; transform:translateY(14px) scale(.99);
  pointer-events:none; transition:opacity .45s, transform .45s}
.screen.active{opacity:1; transform:none; pointer-events:auto}
.wrap{max-width:1200px; margin:0 auto}

/* ---------- boot ---------- */
#boot{display:grid; place-items:center; text-align:center}
.logo{font-family:var(--display); font-weight:900; font-size:clamp(34px,7vw,72px); letter-spacing:4px; line-height:1;
  background:linear-gradient(120deg,var(--blue),var(--purple) 50%,var(--green)); -webkit-background-clip:text; background-clip:text; color:transparent;
  filter:drop-shadow(0 0 30px rgba(177,77,255,.5)); animation:flick 4s infinite}
@keyframes flick{0%,97%,100%{opacity:1}98%{opacity:.6}}
.sub{font-family:var(--mono); letter-spacing:6px; color:var(--blue); margin:14px 0 30px; font-size:13px}
.bootbar{width:280px;height:6px;border-radius:6px;background:rgba(255,255,255,.08);overflow:hidden;margin:0 auto}
.bootbar i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--blue),var(--purple));box-shadow:var(--glow-b)}

/* ---------- home dashboard ---------- */
.home-grid{display:grid; grid-template-columns:1.4fr 1fr; gap:20px}
.hero{padding:30px; position:relative; overflow:hidden; min-height:230px; display:flex; flex-direction:column; justify-content:flex-end}
.hero::before{content:''; position:absolute; inset:0; background:
  radial-gradient(600px 200px at 80% -20%,rgba(177,77,255,.35),transparent),
  radial-gradient(500px 200px at 10% 120%,rgba(45,212,255,.25),transparent)}
.hero h1{position:relative; font-family:var(--display); font-weight:900; font-size:clamp(26px,4vw,44px); letter-spacing:1px}
.hero .grad{background:linear-gradient(120deg,var(--blue),var(--purple)); -webkit-background-clip:text; background-clip:text; color:transparent}
.heroactions{display:flex; gap:12px; margin-top:18px; position:relative; flex-wrap:wrap}
.ring{position:relative; display:grid; place-items:center; padding:20px}
.ring svg{transform:rotate(-90deg)}
.ringtxt{position:absolute; text-align:center}
.ringtxt b{font-family:var(--display); font-size:34px; color:var(--green)}
.statgrid{display:grid; grid-template-columns:1fr 1fr; gap:12px}
.cell{padding:14px 16px; border-radius:14px; background:rgba(255,255,255,.03); border:1px solid var(--line)}
.cell .k{font-family:var(--mono); font-size:10px; letter-spacing:2px; color:var(--dim); text-transform:uppercase}
.cell .v{font-family:var(--display); font-size:22px; font-weight:700; margin-top:4px}
.navgrid{display:grid; grid-template-columns:repeat(4,1fr); gap:14px; margin-top:20px}
.tile{padding:20px 16px; border-radius:16px; text-align:center; background:var(--panel); border:1px solid var(--line);
  transition:.2s; cursor:pointer; backdrop-filter:blur(10px)}
.tile:hover{transform:translateY(-4px); border-color:var(--blue); box-shadow:var(--glow-b)}
.tile .ic{font-size:30px; display:block; filter:drop-shadow(0 0 8px rgba(45,212,255,.5))}
.tile .lb{font-family:var(--display); font-weight:700; font-size:12px; letter-spacing:1px; margin-top:8px; text-transform:uppercase}

/* ---------- world map ---------- */
.map {
  position: relative;
  height: 560px;
  border-radius: 22px;
  overflow: hidden;
  margin-top: 14px;
  background-image: 
    linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px),
    radial-gradient(800px 400px at 50% 50%, rgba(45, 212, 255, 0.05), transparent),
    linear-gradient(180deg, #020108, #050612);
  background-size: 40px 40px, 40px 40px, 100% 100%, 100% 100%;
  background-position: center;
  border: 1.5px solid rgba(120, 140, 255, 0.15);
  box-shadow: inset 0 0 45px rgba(0, 0, 0, 0.95), 0 20px 50px rgba(0, 0, 0, 0.8) !important;
}

.map-hud-overlay {
  position: absolute;
  width: 14px;
  height: 14px;
  border: 1.5px solid rgba(120, 140, 255, 0.3);
  pointer-events: none;
  z-index: 5;
}
.map-hud-overlay.border-tl { top: 12px; left: 12px; border-right: none; border-bottom: none; }
.map-hud-overlay.border-tr { top: 12px; right: 12px; border-left: none; border-bottom: none; }
.map-hud-overlay.border-bl { bottom: 12px; left: 12px; border-right: none; border-top: none; }
.map-hud-overlay.border-br { bottom: 12px; right: 12px; border-left: none; border-top: none; }

.node {
  position: absolute;
  width: 110px;
  height: 110px;
  transform: translate(-50%, -50%);
  text-align: center;
  cursor: pointer;
  z-index: 6;
  transition: filter 0.3s ease;
}
.node:hover {
  filter: brightness(1.2) contrast(1.05);
}

.node-hud-ring {
  position: absolute;
  border-radius: 50%;
  pointer-events: none;
  z-index: 1;
  transition: border-color 0.3s, box-shadow 0.3s;
}
.node-hud-ring.outer {
  width: 96px;
  height: 96px;
  left: 7px;
  top: 7px;
  border: 1px dashed rgba(45, 212, 255, 0.2);
  animation: spinSlow 24s linear infinite;
}
.node-hud-ring.inner {
  width: 82px;
  height: 82px;
  left: 14px;
  top: 14px;
  border: 1px dotted rgba(45, 212, 255, 0.12);
  animation: spinSlowRev 16s linear infinite;
}

.node:hover .node-hud-ring.outer {
  border-color: rgba(255, 255, 255, 0.55);
  box-shadow: 0 0 10px rgba(255, 255, 255, 0.15);
}
.node:hover .node-hud-ring.inner {
  border-color: rgba(255, 255, 255, 0.35);
}

.node.wld-1 .node-hud-ring.outer { border-color: rgba(45,212,255,0.35); }
.node.wld-1 .node-hud-ring.inner { border-color: rgba(45,212,255,0.18); }
.node.wld-2 .node-hud-ring.outer { border-color: rgba(57,255,158,0.35); }
.node.wld-2 .node-hud-ring.inner { border-color: rgba(57,255,158,0.18); }
.node.wld-3 .node-hud-ring.outer { border-color: rgba(255,77,157,0.35); }
.node.wld-3 .node-hud-ring.inner { border-color: rgba(255,77,157,0.18); }
.node.wld-4 .node-hud-ring.outer { border-color: rgba(177,77,255,0.35); }
.node.wld-4 .node-hud-ring.inner { border-color: rgba(177,77,255,0.18); }
.node.wld-5 .node-hud-ring.outer { border-color: rgba(255,209,102,0.35); }
.node.wld-5 .node-hud-ring.inner { border-color: rgba(255,209,102,0.18); }
.node.wld-6 .node-hud-ring.outer { border-color: rgba(120,140,255,0.35); }
.node.wld-6 .node-hud-ring.inner { border-color: rgba(120,140,255,0.18); }
.node.wld-7 .node-hud-ring.outer { border-color: rgba(255,0,85,0.35); }
.node.wld-7 .node-hud-ring.inner { border-color: rgba(255,0,85,0.18); }

@keyframes spinSlow {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}
@keyframes spinSlowRev {
  from { transform: rotate(0deg); }
  to { transform: rotate(-360deg); }
}

.hex-wrapper {
  position: relative;
  width: 76px;
  height: 76px;
  margin: 17px auto;
  z-index: 3;
}
.hex-border {
  position: absolute;
  inset: -2.2px;
  clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
  z-index: 2;
  transition: all 0.3s ease;
}
.orb {
  position: absolute;
  inset: 0;
  clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
  display: grid;
  place-items: center;
  font-size: 32px;
  z-index: 3;
  transition: all 0.3s ease;
}
.node:hover .orb {
  transform: scale(1.08);
}

.node.wld-1 .hex-border { background: #2dd4ff; box-shadow: 0 0 15px rgba(45,212,255,0.5); }
.node.wld-1 .orb { background: radial-gradient(circle at 35% 30%, rgba(45,212,255,0.35), rgba(0,119,255,0.25)); }

.node.wld-2 .hex-border { background: #39ff9e; box-shadow: 0 0 15px rgba(57,255,158,0.5); }
.node.wld-2 .orb { background: radial-gradient(circle at 35% 30%, rgba(57,255,158,0.35), rgba(0,170,80,0.25)); }

.node.wld-3 .hex-border { background: #ff4d9d; box-shadow: 0 0 15px rgba(255,77,157,0.5); }
.node.wld-3 .orb { background: radial-gradient(circle at 35% 30%, rgba(255,77,157,0.35), rgba(255,51,0,0.25)); }

.node.wld-4 .hex-border { background: #b14dff; box-shadow: 0 0 15px rgba(177,77,255,0.5); }
.node.wld-4 .orb { background: radial-gradient(circle at 35% 30%, rgba(177,77,255,0.35), rgba(85,0,170,0.25)); }

.node.wld-5 .hex-border { background: #ffd166; box-shadow: 0 0 15px rgba(255,209,102,0.5); }
.node.wld-5 .orb { background: radial-gradient(circle at 35% 30%, rgba(255,209,102,0.35), rgba(255,136,0,0.25)); }

.node.wld-6 .hex-border { background: #788cff; box-shadow: 0 0 15px rgba(120,140,255,0.5); }
.node.wld-6 .orb { background: radial-gradient(circle at 35% 30%, rgba(120,140,255,0.35), rgba(17,34,102,0.25)); }

.node.wld-7 .hex-border { background: #ff0055; box-shadow: 0 0 15px rgba(255,0,85,0.5); }
.node.wld-7 .orb { background: radial-gradient(circle at 35% 30%, rgba(255,0,85,0.35), rgba(255,209,102,0.25)); }

.node.locked .hex-border {
  background: #15182a !important;
  box-shadow: none !important;
  opacity: 0.6;
}
.node.locked .orb {
  box-shadow: none !important;
  filter: grayscale(0.8) brightness(0.35) !important;
  background: rgba(10, 12, 22, 0.8) !important;
}

.node .nm {
  font-family: var(--display);
  font-weight: 700;
  font-size: 11.5px;
  letter-spacing: .5px;
  margin-top: 6px;
  color: #ffffff;
  text-shadow: 0 0 6px rgba(255, 255, 255, 0.25);
  transition: all 0.2s ease;
}
.node:hover .nm {
  text-shadow: 0 0 10px #ffffff;
}
.node .st {
  font-family: var(--mono);
  font-size: 8.5px;
  color: var(--dim);
  letter-spacing: 1px;
  text-transform: uppercase;
  font-weight: bold;
  margin-top: 1px;
}
.node.done .st { color: var(--green) !important; text-shadow: 0 0 5px rgba(57,255,158,0.4); }
.node:not(.locked):not(.done) .st { color: var(--blue) !important; text-shadow: 0 0 5px rgba(45,212,255,0.4); }
.node.locked .st { color: #555566 !important; }
.node.locked .nm { color: #555566; text-shadow: none; }

.lock-ic {
  position: absolute;
  bottom: -4px;
  right: -4px;
  font-size: 18px;
  z-index: 5;
  filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
}
#paths {
  position: absolute;
  inset: 0;
  pointer-events: none;
}
.active-path {
  animation: dashMove 15s linear infinite;
}
@keyframes dashMove {
  0% { stroke-dashoffset: 0; }
  100% { stroke-dashoffset: -40; }
}

/* Floating HUD Sector Analyzer styles */
.hud-panel {
  position: absolute;
  top: 24px;
  left: 24px;
  width: 280px;
  padding: 16px;
  border-radius: 16px;
  font-family: var(--mono);
  font-size: 11px;
  color: var(--dim);
  z-index: 10;
  pointer-events: none;
  border: 1px solid rgba(120, 140, 255, 0.25);
  background: rgba(10, 13, 28, 0.75) !important;
  backdrop-filter: blur(12px) !important;
  box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(255, 255, 255, 0.05);
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.hud-panel-header {
  display: flex;
  align-items: center;
  gap: 8px;
  font-family: var(--display);
  font-weight: 700;
  font-size: 11px;
  color: var(--blue);
  letter-spacing: 1px;
}
.hud-pulse {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--green);
  box-shadow: 0 0 8px var(--green);
  animation: pulseGlow 1.5s infinite alternate;
}
.hud-panel-coords {
  font-size: 10px;
  color: #fff;
  letter-spacing: 0.5px;
}
.hud-divider {
  height: 1px;
  background: linear-gradient(90deg, rgba(120, 140, 255, 0.3), transparent);
}
.hud-placeholder {
  font-size: 10px;
  line-height: 1.6;
  color: rgba(138, 147, 196, 0.5);
  text-align: center;
  padding: 12px 0;
  letter-spacing: 0.5px;
}
.hud-meta-row {
  display: flex;
  margin-bottom: 4px;
  line-height: 1.4;
}
.hud-meta-row .k {
  width: 75px;
  flex-shrink: 0;
  color: var(--dim);
}
.hud-meta-row .v {
  flex-grow: 1;
  color: #fff;
}
.status-cleared {
  color: var(--green) !important;
  text-shadow: 0 0 6px rgba(57, 255, 158, 0.5);
}
.status-active {
  color: var(--blue) !important;
  text-shadow: 0 0 6px rgba(45, 212, 255, 0.5);
}
.status-locked {
  color: var(--pink) !important;
  text-shadow: 0 0 6px rgba(255, 77, 157, 0.5);
}
.hud-telemetry {
  display: flex;
  gap: 3px;
  height: 12px;
  align-items: flex-end;
}
.telemetry-bar {
  flex: 1;
  height: 3px;
  background: var(--blue);
  opacity: 0.4;
  animation: telemetryPulse 0.6s infinite alternate;
  animation-play-state: paused;
}
.telemetry-bar:nth-child(1) { animation-delay: 0.1s; }
.telemetry-bar:nth-child(2) { animation-delay: 0.2s; height: 6px; background: var(--purple); }
.telemetry-bar:nth-child(3) { animation-delay: 0.3s; height: 4px; background: var(--green); }
.telemetry-bar:nth-child(4) { animation-delay: 0.4s; height: 8px; background: var(--pink); }

@keyframes telemetryPulse {
  0% { transform: scaleY(0.4); }
  100% { transform: scaleY(1.3); }
}

/* ---------- world detail ---------- */
.tabs{display:flex; gap:10px; margin:18px 0; flex-wrap:wrap}
.tab{padding:10px 20px; border-radius:12px; font-family:var(--display); font-size:12px; letter-spacing:1px; text-transform:uppercase;
  border:1px solid var(--line); background:rgba(255,255,255,.03)}
.tab.active{border-color:var(--purple); box-shadow:var(--glow-p); color:#fff}
.tab:disabled{opacity:.45}
.road{display:grid; gap:12px}
.step{display:flex; gap:14px; align-items:center; padding:14px 18px; border-radius:14px; border:1px solid var(--line); background:rgba(255,255,255,.025)}
.step.done{border-color:var(--green)} .step.locked{opacity:.5}
.step .num{width:38px;height:38px;border-radius:10px;display:grid;place-items:center;font-family:var(--display);font-weight:700;
  background:rgba(45,212,255,.12); border:1px solid var(--blue)}
.step.done .num{border-color:var(--green); background:rgba(57,255,158,.12)}
.step .info{flex:1}
.step .info b{font-family:var(--display); font-size:14px; letter-spacing:.5px}
.step .info p{font-size:13px; color:var(--dim)}
.mlist{display:grid; grid-template-columns:repeat(auto-fill,minmax(230px,1fr)); gap:14px}
.mcard{padding:18px; border-radius:16px; border:1px solid var(--line); background:var(--panel); cursor:pointer; transition:.2s}
.mcard:hover{transform:translateY(-3px); border-color:var(--blue); box-shadow:var(--glow-b)}
.mcard.locked{opacity:.5; cursor:not-allowed}
.mcard.cleared{border-color:var(--green)}
.mcard .mi{font-size:26px} .mcard h4{font-family:var(--display); font-size:14px; margin:8px 0 4px; letter-spacing:.5px}
.mcard p{font-size:12px; color:var(--dim)}
.badge{display:inline-block; font-family:var(--mono); font-size:9px; letter-spacing:1px; padding:3px 8px; border-radius:20px; margin-top:8px;
  border:1px solid var(--line); text-transform:uppercase}
.badge.ok{color:var(--green); border-color:var(--green)}
.badge.lock{color:var(--dim)}

/* ---------- play arena ---------- */
.arena{padding:24px; min-height:420px}
.cells{display:flex; gap:10px; flex-wrap:wrap; justify-content:center; margin:24px 0}
.acell{width:60px; text-align:center; transition:.35s}
.acell .box{height:60px; border-radius:12px; display:grid; place-items:center; font-family:var(--mono); font-weight:700; font-size:18px;
  border:1px solid var(--blue); background:rgba(45,212,255,.08); box-shadow:inset 0 0 12px rgba(45,212,255,.2); cursor:pointer; transition:.2s}
.acell .box:hover{box-shadow:0 0 18px rgba(45,212,255,.6)}
.acell .idx{font-family:var(--mono); font-size:11px; color:var(--dim); margin-top:5px}
.acell.hl .box{border-color:var(--gold); box-shadow:0 0 22px rgba(255,209,102,.7); background:rgba(255,209,102,.12); transform:translateY(-6px)}
.acell.good .box{border-color:var(--green); box-shadow:var(--glow-g); background:rgba(57,255,158,.15)}
.acell.bad .box{border-color:var(--pink); box-shadow:0 0 18px rgba(255,77,157,.6); background:rgba(255,77,157,.12)}
.acell.lo .box{border-color:var(--purple)} .acell.dim .box{opacity:.25}
.prompt{text-align:center; font-size:17px; min-height:26px; margin-bottom:6px}
.prompt b{color:var(--blue)}
.controls{display:flex; gap:10px; justify-content:center; flex-wrap:wrap; margin-top:18px}
.feedback{text-align:center; min-height:24px; font-family:var(--display); letter-spacing:1px; margin-top:14px}
.feedback.win{color:var(--green)} .feedback.lose{color:var(--pink)}

/* ---------- boss ---------- */
.boss-wrap{text-align:center; padding:10px}
.boss-art{font-size:90px; filter:drop-shadow(0 0 30px rgba(255,77,157,.6)); animation:bob 3s ease-in-out infinite}
.boss-art.hit{animation:shake .4s}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-12px) rotate(-3deg)}60%{transform:translateX(12px) rotate(3deg)}}
.hpbar{height:16px; border-radius:10px; background:rgba(255,255,255,.08); overflow:hidden; border:1px solid var(--pink); max-width:480px; margin:10px auto}
.hpfill{height:100%; width:100%; background:linear-gradient(90deg,var(--pink),#ff8a4d); transition:width .5s; box-shadow:0 0 14px rgba(255,77,157,.6)}
.playerhp{max-width:300px; margin:6px auto} .playerhp .hpfill{background:linear-gradient(90deg,var(--green),var(--blue))}
.qbox{max-width:620px; margin:18px auto; text-align:left}
.opts{display:grid; gap:10px; margin-top:14px}
.opt{padding:14px 18px; border-radius:12px; border:1px solid var(--line); background:rgba(255,255,255,.03); text-align:left; font-size:15px; transition:.15s}
.opt:hover{border-color:var(--blue); box-shadow:var(--glow-b)}
.opt.right{border-color:var(--green); box-shadow:var(--glow-g)}
.opt.wrong{border-color:var(--pink)}
.timer{font-family:var(--mono); font-size:13px; color:var(--gold); text-align:center; letter-spacing:1px}
.timering{height:5px; border-radius:5px; background:rgba(255,255,255,.08); overflow:hidden; max-width:620px; margin:8px auto}
.timering i{display:block; height:100%; background:linear-gradient(90deg,var(--green),var(--gold),var(--pink)); transition:width 1s linear}

/* ---------- lists (achv / leaderboard / inv) ---------- */
.grid3{display:grid; grid-template-columns:repeat(auto-fill,minmax(210px,1fr)); gap:14px; margin-top:10px}
.achv{padding:16px; border-radius:14px; border:1px solid var(--line); background:rgba(255,255,255,.025); display:flex; gap:12px; align-items:center; opacity:.5}
.achv.got{opacity:1; border-color:var(--gold); box-shadow:0 0 14px rgba(255,209,102,.25)}
.achv .ic{font-size:26px} .achv b{font-family:var(--display); font-size:12px; letter-spacing:.5px} .achv p{font-size:11px; color:var(--dim)}
.lb-row{display:flex; align-items:center; gap:14px; padding:12px 16px; border-radius:12px; border:1px solid var(--line); margin-bottom:8px; background:rgba(255,255,255,.025)}
.lb-row.me{border-color:var(--purple); box-shadow:var(--glow-p)}
.lb-rank{font-family:var(--display); font-weight:900; font-size:18px; width:36px; color:var(--gold)}
.lb-name{flex:1; font-family:var(--display); font-size:14px}
.lb-xp{font-family:var(--mono); color:var(--green)}
.lb-tabs{display:flex; gap:8px; margin-bottom:14px}

/* ---------- toasts / overlays ---------- */
#toasts{position:fixed; top:80px; right:20px; z-index:50; display:flex; flex-direction:column; gap:10px}
.toast{padding:14px 18px; border-radius:14px; min-width:240px; display:flex; gap:12px; align-items:center;
  background:rgba(18,22,46,.92); border:1px solid var(--gold); box-shadow:0 0 24px rgba(255,209,102,.4); animation:slidein .4s}
.toast .ic{font-size:26px}
.toast b{font-family:var(--display); font-size:13px; letter-spacing:.5px; color:var(--gold)}
.toast p{font-size:12px; color:var(--dim)}
@keyframes slidein{from{transform:translateX(120%); opacity:0}}
#overlay{position:fixed; inset:0; z-index:40; display:none; place-items:center; background:rgba(3,4,12,.82); backdrop-filter:blur(6px)}
#overlay.show{display:grid; animation:fade .3s}
@keyframes fade{from{opacity:0}}
.modal{max-width:520px; text-align:center; padding:36px}
.modal .big{font-family:var(--display); font-weight:900; font-size:34px; letter-spacing:2px; margin:6px 0;
  background:linear-gradient(120deg,var(--gold),var(--pink)); -webkit-background-clip:text; background-clip:text; color:transparent}
.loot{font-size:70px; margin:10px 0; animation:bob 2.5s infinite}
.rewardrow{display:flex; gap:12px; justify-content:center; flex-wrap:wrap; margin:18px 0}
.chip{font-family:var(--mono); font-size:12px; padding:8px 14px; border-radius:20px; border:1px solid var(--green); color:var(--green)}

/* profile setup */
.setup{max-width:560px; margin:0 auto; text-align:center; padding:40px}
.avapick{display:flex; gap:12px; justify-content:center; flex-wrap:wrap; margin:18px 0}
.ava{width:64px;height:64px;border-radius:16px;display:grid;place-items:center;font-size:32px;border:1px solid var(--line);background:rgba(255,255,255,.03); cursor:pointer; transition:.15s}
.ava.sel{border-color:var(--purple); box-shadow:var(--glow-p); transform:scale(1.08)}
input.name{width:100%; max-width:360px; padding:14px 18px; border-radius:12px; background:rgba(255,255,255,.05); border:1px solid var(--blue);
  color:var(--txt); font-family:var(--display); font-size:18px; text-align:center; letter-spacing:1px; outline:none; box-shadow:var(--glow-b)}

.back{position:absolute; top:18px; left:18px; z-index:5}
.sectionhead{display:flex; align-items:center; justify-content:space-between; margin-bottom:6px}
.h2{font-family:var(--display); font-weight:900; font-size:26px; letter-spacing:1px}
.powcard{padding:16px; border-radius:14px; border:1px solid var(--line); background:rgba(255,255,255,.025)}
.powcard.on{border-color:var(--blue); box-shadow:var(--glow-b)}
.powcard .ic{font-size:28px}

@media(max-width:860px){
  .home-grid{grid-template-columns:1fr} .navgrid{grid-template-columns:repeat(2,1fr)}
  #hud{flex-wrap:wrap; gap:10px} .xpwrap{order:5; max-width:100%; flex-basis:100%}
}
@media(prefers-reduced-motion:reduce){*{animation:none!important; transition:none!important}}

/* ---------- game enhancements ---------- */
.combo-counter{position:absolute;top:10px;right:16px;font-family:var(--display);font-weight:900;font-size:clamp(18px,3vw,28px);
  color:var(--gold);text-shadow:0 0 20px rgba(255,209,102,.7);transition:.3s;z-index:5}
.combo-counter.fire{color:var(--pink);text-shadow:0 0 30px rgba(255,77,157,.8);animation:comboPop .4s}
.combo-counter.ultra{color:#fff;text-shadow:0 0 40px rgba(177,77,255,.9),0 0 80px rgba(45,212,255,.5);animation:comboPop .4s}
@keyframes comboPop{0%{transform:scale(1.8);opacity:.6}100%{transform:scale(1);opacity:1}}
.streak-msg{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-family:var(--display);font-weight:900;
  font-size:clamp(30px,5vw,52px);pointer-events:none;z-index:10;opacity:0;
  background:linear-gradient(135deg,var(--gold),var(--pink));-webkit-background-clip:text;background-clip:text;color:transparent;
  filter:drop-shadow(0 0 30px rgba(255,209,102,.8));animation:streakFlash 1.2s ease-out forwards}
@keyframes streakFlash{0%{opacity:0;transform:translate(-50%,-50%) scale(.5)}15%{opacity:1;transform:translate(-50%,-50%) scale(1.3)}
  50%{opacity:1;transform:translate(-50%,-50%) scale(1)}100%{opacity:0;transform:translate(-50%,-60%) scale(.8)}}
.screen-shake{animation:screenShake .35s}
@keyframes screenShake{0%,100%{transform:translate(0)}20%{transform:translate(-4px,2px)}40%{transform:translate(4px,-2px)}60%{transform:translate(-2px,4px)}80%{transform:translate(2px,-4px)}}
.acell.good .box{animation:cellWin .5s}
@keyframes cellWin{0%{transform:scale(1)}40%{transform:scale(1.25) rotate(5deg)}100%{transform:scale(1)}}
.acell.bad .box{animation:cellFail .4s}
@keyframes cellFail{0%{transform:translateX(0)}25%{transform:translateX(-8px)}50%{transform:translateX(8px)}75%{transform:translateX(-4px)}100%{transform:translateX(0)}}
.mission-timer{font-family:var(--mono);font-size:22px;color:var(--gold);text-align:center;letter-spacing:2px;
  text-shadow:0 0 14px rgba(255,209,102,.5);min-height:30px}
.mission-timer.danger{color:var(--pink);text-shadow:0 0 14px rgba(255,77,157,.7);animation:timerPulse .5s infinite}
@keyframes timerPulse{0%,100%{opacity:1}50%{opacity:.5}}
.bonus-popup{position:absolute;pointer-events:none;font-family:var(--display);font-weight:900;font-size:18px;
  color:var(--green);text-shadow:0 0 10px rgba(57,255,158,.6);animation:bonusFly 1s ease-out forwards;z-index:10}
@keyframes bonusFly{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-50px) scale(.6)}}
.arena{position:relative;overflow:hidden}
.lb-time{font-family:var(--mono);color:var(--blue);font-size:13px}
.lb-row.top1{border-color:var(--gold);box-shadow:0 0 20px rgba(255,209,102,.3);background:rgba(255,209,102,.05)}
.lb-row.top2{border-color:#c0c0c0;box-shadow:0 0 14px rgba(192,192,192,.2)}
.lb-row.top3{border-color:#cd7f32;box-shadow:0 0 14px rgba(205,127,50,.2)}
.opt::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(45,212,255,.1),transparent);
  transform:translateX(-100%);transition:none}
.opt:hover::after{transform:translateX(100%);transition:transform .6s}

@keyframes pulseGlow{0%{box-shadow:inset 0 0 15px rgba(177,77,255,.3), 0 0 10px rgba(177,77,255,.2)}100%{box-shadow:inset 0 0 35px rgba(45,212,255,.6), 0 0 20px rgba(45,212,255,.4)}}

/* ========== HOLOGRAM VISUALIZERS ========== */
.hologram-visualizer {
  position: relative;
  width: 100%;
  height: 220px;
  background: radial-gradient(circle at 50% 50%, rgba(10,13,28,.8), rgba(5,6,13,.95));
  border: 1px dashed var(--line);
  border-radius: 14px;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  margin-bottom: 16px;
  box-shadow: inset 0 0 20px rgba(45,212,255,.05);
}
.hologram-visualizer::before {
  content: '';
  position: absolute;
  inset: 0;
  background-image: 
    linear-gradient(rgba(120,140,255,.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(120,140,255,.03) 1px, transparent 1px);
  background-size: 20px 20px;
  background-position: center;
  pointer-events: none;
}
.hologram-scanline {
  position: absolute;
  width: 100%;
  height: 4px;
  background: linear-gradient(180deg, transparent, rgba(45,212,255,.2), transparent);
  animation: hologramScan 6s linear infinite;
  pointer-events: none;
}
@keyframes hologramScan {
  0% { top: -4px; }
  100% { top: 100%; }
}
.hologram-caption {
  position: absolute;
  bottom: 8px;
  left: 14px;
  right: 14px;
  font-family: var(--mono);
  font-size: 11px;
  color: var(--blue);
  letter-spacing: 1px;
  background: rgba(5,6,13,.8);
  padding: 5px 12px;
  border-radius: 6px;
  border: 1px solid rgba(45,212,255,.15);
  text-align: center;
  z-index: 5;
  box-shadow: 0 4px 10px rgba(0,0,0,.5);
}
.hologram-canvas-container {
  width: 100%;
  height: 100%;
  position: relative;
  display: flex;
  justify-content: center;
  align-items: center;
}
.holo-node {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  border: 2px solid var(--blue);
  background: rgba(45,212,255,.1);
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: var(--mono);
  font-weight: bold;
  font-size: 13px;
  color: #fff;
  box-shadow: 0 0 10px rgba(45,212,255,.25);
  position: absolute;
  transition: all 0.5s cubic-bezier(0.2,0.8,0.2,1);
}
.holo-node.green {
  border-color: var(--green);
  background: rgba(57,255,158,.1);
  box-shadow: 0 0 10px rgba(57,255,158,.25);
}
.holo-node.pink {
  border-color: var(--pink);
  background: rgba(255,77,157,.1);
  box-shadow: 0 0 10px rgba(255,77,157,.25);
}
.holo-node.gold {
  border-color: var(--gold);
  background: rgba(255,209,102,.1);
  box-shadow: 0 0 10px rgba(255,209,102,.25);
}
.holo-node.pulse {
  animation: holoPulse 1s infinite alternate;
}
@keyframes holoPulse {
  0% { transform: scale(1); box-shadow: 0 0 8px rgba(45,212,255,.2); }
  100% { transform: scale(1.1); box-shadow: 0 0 15px rgba(45,212,255,.5); }
}
.holo-arrow {
  position: absolute;
  height: 2px;
  background: rgba(177,77,255,.45);
  box-shadow: 0 0 6px rgba(177,77,255,.25);
  transform-origin: 0 50%;
  transition: all 0.5s cubic-bezier(0.2,0.8,0.2,1);
  z-index: 1;
}
.holo-arrow::after {
  content: '';
  position: absolute;
  right: -5px;
  top: -4px;
  border-left: 6px solid rgba(177,77,255,.8);
  border-top: 5px solid transparent;
  border-bottom: 5px solid transparent;
}
.holo-arrow.pulse {
  background: var(--blue);
  box-shadow: 0 0 10px var(--blue);
}
.holo-arrow.pulse::after {
  border-left-color: var(--blue);
}
.holo-stack-tube {
  width: 64px;
  height: 140px;
  border: 2px solid var(--purple);
  border-top: none;
  background: rgba(177,77,255,.05);
  box-shadow: inset 0 -10px 20px rgba(177,77,255,.1);
  border-radius: 0 0 10px 10px;
  position: relative;
  display: flex;
  flex-direction: column-reverse;
  align-items: center;
  padding: 6px 0;
  gap: 6px;
}
.holo-queue-tube {
  width: 80%;
  height: 48px;
  border-top: 2px solid var(--green);
  border-bottom: 2px solid var(--green);
  background: rgba(57,255,158,.03);
  position: relative;
  display: flex;
  align-items: center;
  padding: 0 20px;
  border-radius: 6px;
}
.holo-queue-gate {
  position: absolute;
  width: 2px;
  height: 100%;
  background: var(--green);
  box-shadow: 0 0 8px var(--green);
}
.holo-queue-gate.front { left: 10px; }
.holo-queue-gate.rear { right: 10px; }
.holo-array-container {
  display: flex;
  gap: 5px;
}
.holo-array-cell {
  width: 36px;
  height: 46px;
  display: flex;
  flex-direction: column;
  align-items: center;
}
.holo-array-box {
  width: 36px;
  height: 32px;
  border: 1px solid var(--blue);
  background: rgba(45,212,255,.08);
  display: grid;
  place-items: center;
  font-family: var(--mono);
  font-size: 13px;
  color: #fff;
  border-radius: 6px;
  box-shadow: 0 0 5px rgba(45,212,255,.2);
  transition: all 0.4s;
}
.holo-array-box.hl {
  border-color: var(--gold);
  background: rgba(255,209,102,.2);
  box-shadow: 0 0 12px rgba(255,209,102,.5);
  transform: translateY(-3px);
}
.holo-array-box.shift {
  transform: translateX(41px);
  opacity: 0.8;
  border-color: var(--purple);
}
.holo-array-box.new {
  transform: translateY(-20px);
  opacity: 0;
  animation: dropInNew 0.5s forwards;
}
@keyframes dropInNew {
  to { transform: none; opacity: 1; border-color: var(--green); background: rgba(57,255,158,.2); }
}
.holo-array-idx {
  font-family: var(--mono);
  font-size: 9px;
  color: var(--dim);
  margin-top: 3px;
}
.arena-split {
  display: flex;
  flex-direction: column;
  gap: 16px;
}
@media(min-width: 900px) {
  .arena-split {
    display: grid;
    grid-template-columns: 1.4fr 1fr;
    gap: 24px;
    align-items: flex-start;
  }
}

/* ========== GUIDER AI CHATBOT STYLE ========== */
#oracle-bubble {
  position: fixed;
  bottom: 24px;
  right: 24px;
  width: 54px;
  height: 54px;
  border-radius: 50%;
  background: radial-gradient(circle at 30% 30%, rgba(45,212,255,.4), rgba(177,77,255,.25));
  border: 2px solid var(--blue);
  box-shadow: var(--glow-b);
  display: none; /* Hidden by default, shown only on home page */
  place-items: center;
  font-size: 26px;
  cursor: pointer;
  z-index: 99;
  transition: all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
  animation: bob 3s ease-in-out infinite;
}
#oracle-bubble:hover {
  transform: scale(1.1) translateY(-3px);
  box-shadow: 0 0 25px rgba(45,212,255,.8);
  border-color: #fff;
}
#oracle-chat-window {
  position: fixed;
  bottom: 90px;
  right: 24px;
  width: 350px;
  height: 460px;
  z-index: 98;
  display: flex;
  flex-direction: column;
  border: 1px solid var(--line);
  box-shadow: inset 0 1px 0 rgba(255,255,255,.05), 0 20px 50px rgba(0,0,0,.6);
  transition: all 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
  transform-origin: bottom right;
  overflow: hidden;
}
#oracle-chat-window.hidden {
  opacity: 0;
  transform: scale(0.8) translateY(30px);
  pointer-events: none;
}
.oracle-msg {
  padding: 10px 14px;
  border-radius: 12px;
  font-size: 13px;
  line-height: 1.55;
  max-width: 85%;
  word-wrap: break-word;
  font-family: var(--body);
}
.oracle-msg.oracle {
  align-self: flex-start;
  background: rgba(45,212,255,0.08);
  border: 1px solid rgba(45,212,255,0.18);
  color: #fff;
  box-shadow: 0 4px 10px rgba(0,0,0,0.15);
}
.oracle-msg.user {
  align-self: flex-end;
  background: rgba(177,77,255,0.12);
  border: 1px solid rgba(177,77,255,0.25);
  color: #e8ecff;
  box-shadow: 0 4px 10px rgba(0,0,0,0.15);
}
.oracle-typing {
  align-self: flex-start;
  background: rgba(45,212,255,0.05);
  border: 1px solid rgba(45,212,255,0.1);
  color: var(--dim);
  font-family: var(--mono);
  font-size: 11px;
  font-style: italic;
  padding: 8px 12px;
  border-radius: 10px;
}

/* ========== LANDING PAGE ========== */
#landing{position:fixed;inset:0;z-index:100;display:flex;flex-direction:column;align-items:center;
  background:var(--void);overflow-y:auto;overflow-x:hidden}
#landing.hidden{display:none}
.land-hero{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;
  text-align:center;position:relative;padding:40px 20px;width:100%}
.land-hero::before{content:'';position:absolute;inset:0;
  background:radial-gradient(800px 600px at 50% 30%,rgba(177,77,255,.18),transparent),
             radial-gradient(600px 400px at 20% 80%,rgba(45,212,255,.12),transparent),
             radial-gradient(500px 400px at 80% 70%,rgba(57,255,158,.1),transparent);
  animation:landPulse 8s ease-in-out infinite alternate}
@keyframes landPulse{0%{opacity:.7}100%{opacity:1}}

.land-title{font-family:var(--display);font-weight:900;font-size:clamp(42px,9vw,96px);letter-spacing:6px;
  background:linear-gradient(135deg,var(--blue),var(--purple) 45%,var(--green) 80%,var(--gold));
  -webkit-background-clip:text;background-clip:text;color:transparent;
  filter:drop-shadow(0 0 40px rgba(177,77,255,.5)) drop-shadow(0 0 80px rgba(45,212,255,.3));
  animation:flick 4s infinite;position:relative;line-height:1.1}
.land-subtitle{font-family:var(--mono);font-size:clamp(11px,1.5vw,15px);letter-spacing:6px;color:var(--blue);
  text-transform:uppercase;margin:16px 0 8px;position:relative}
.land-desc{font-family:var(--body);font-size:clamp(16px,2vw,22px);color:var(--dim);max-width:640px;
  line-height:1.6;margin:12px 0 36px;position:relative}
.land-desc b{color:var(--txt)}

.land-cta{position:relative;padding:18px 44px;font-family:var(--display);font-weight:900;
  font-size:16px;letter-spacing:3px;text-transform:uppercase;border-radius:16px;
  background:linear-gradient(135deg,rgba(45,212,255,.2),rgba(177,77,255,.2),rgba(57,255,158,.2));
  border:2px solid var(--purple);color:#eaffff;
  box-shadow:0 0 30px rgba(177,77,255,.5),0 0 60px rgba(45,212,255,.2),inset 0 1px 0 rgba(255,255,255,.1);

/* ---------------- particle background ---------------- */
(function particles(){
  const c=document.getElementById('bg'), x=c.getContext('2d');
  let W,H,parts=[];
  function size(){W=c.width=innerWidth; H=c.height=innerHeight;}
  size(); addEventListener('resize',size);
  const COL=['45,212,255','177,77,255','57,255,158'];
  for(let i=0;i<90;i++)parts.push({x:Math.random()*W,y:Math.random()*H,
    r:Math.random()*2+.4,vx:(Math.random()-.5)*.25,vy:(Math.random()-.5)*.25,
    c:COL[i%3],a:Math.random()*.6+.15});
  function loop(){
    x.clearRect(0,0,W,H);
    x.fillStyle='#05060d'; x.fillRect(0,0,W,H);
    for(const p of parts){
      p.x+=p.vx; p.y+=p.vy;
      if(p.x<0)p.x=W; if(p.x>W)p.x=0; if(p.y<0)p.y=H; if(p.y>H)p.y=0;
      x.beginPath(); x.arc(p.x,p.y,p.r,0,7); x.fillStyle='rgba('+p.c+','+p.a+')';
      x.shadowBlur=8; x.shadowColor='rgba('+p.c+',.8)'; x.fill();
    }
    x.shadowBlur=0;
    requestAnimationFrame(loop);
  }
  loop();
})();

const ROADMAPS={
 1:[['What is an Array','An array stores elements in contiguous (back-to-back) memory slots, all of the same type. Because elements are packed together, the CPU can jump to any index instantly using simple arithmetic — making random access O(1).'],
    ['Memory Representation','The address of any element is calculated as: base_address + index × element_size. This formula is why indexing is blazing fast — no scanning needed, just one multiplication and one addition.'],
    ['Indexing','Arrays use zero-based indexing: the first element sits at index 0, the second at index 1, and so on. Accessing arr[i] is always O(1) time because it translates directly to a memory address.'],
    ['Traversal','Visiting every element from index 0 to n−1 is called traversal. It costs O(n) time since you touch each element exactly once. This is the foundation of many algorithms like search and aggregation.'],
    ['Insertion','To insert at position k, you must shift elements k through n−1 one slot to the right, then place the new value. Worst case (inserting at index 0) is O(n) time. Inserting at the end is O(1) if space is available.'],
    ['Deletion','Deleting at position k requires shifting elements k+1 through n−1 one slot left to close the gap. Worst case is O(n). Deleting the last element is O(1) since no shifting is needed.'],

    ['Binary Search','Only works on sorted arrays. Compare the target to the middle element, then eliminate half the search space. Repeat until found. Time: O(log n). This is exponentially faster than linear search for large arrays.'],
    ['Sorting Algorithms','Bubble Sort and Selection Sort are O(n²) — simple but slow. Merge Sort is O(n log n) with O(n) extra space. Quick Sort is O(n log n) average, O(n²) worst case, but sorts in-place with O(log n) stack space.'],
    ['Array Complexity Summary','Access: O(1) | Search: O(n) unsorted, O(log n) sorted | Insert/Delete: O(n) worst case, O(1) at end. Space: O(n) for n elements. Arrays are best when you need fast index-based access and know the size upfront.']],
 2:[['Node Structure','A linked list node contains two parts: a data field holding the value, and a pointer (or reference) to the next node. Unlike arrays, nodes can be scattered anywhere in memory — the pointers chain them together.'],
    ['Pointer Mechanics','The "next" pointer stores the memory address of the following node. The last node points to null, signaling the end. This pointer-based structure means no contiguous memory is required, but you lose O(1) random access.'],
    ['Traversal','Start at the head and follow each "next" pointer until you reach null. This takes O(n) time since you must visit each node sequentially. There is no shortcut to jump to the k-th node — you must walk there.'],
    ['Insertion','Inserting a new node requires rewiring just 1–2 pointers: set the new node\'s next to the current node\'s next, then update the current node\'s next. This is O(1) if you already have a reference to the insertion point; O(n) if you must search first.'],
    ['Deletion','Remove a node by updating the previous node\'s next pointer to skip over it. Like insertion, the pointer surgery is O(1), but finding the node to delete may cost O(n) if you need to search for it.'],
    ['Reversing a Linked List','Use three pointers (prev, current, next) to flip each link direction as you traverse. Walk through the list once, reversing each pointer. Time: O(n), Space: O(1). A fundamental interview classic.'],
    ['Cycle Detection — Floyd\'s Algorithm','Use two pointers: slow moves one step, fast moves two steps. If they meet, a cycle exists. Time: O(n), Space: O(1). To find the cycle start, reset one pointer to head and advance both at the same speed.'],
    ['Linked List Complexity Summary','Access: O(n) | Search: O(n) | Insert/Delete at known position: O(1) | Insert/Delete with search: O(n). Space: O(n) plus extra pointer overhead per node. Best when you need frequent insertions/deletions and don\'t need random access.']],
 3:[['Push Operation','Push adds an element to the top of the stack. Think of stacking plates — the newest plate goes on top. Time: O(1). If using a fixed-size array, pushing beyond capacity causes stack overflow.'],
    ['Pop Operation','Pop removes and returns the top element. The most recently pushed item comes off first — this is the LIFO (Last In, First Out) principle. Time: O(1). Popping from an empty stack causes underflow.'],
    ['Peek / Top','Peek lets you look at the top element without removing it. Useful when you need to inspect the current state without modifying the stack. Time: O(1). Also called "top" in many implementations.'],
    ['Stack Overflow','Overflow occurs when you try to push onto a full stack (in array-based implementations). Dynamic stacks (using linked lists or dynamic arrays) can grow as needed, avoiding overflow but using more memory.'],
    ['Stack Underflow','Underflow occurs when you try to pop from an empty stack. Always check isEmpty() before popping. Robust implementations throw an exception or return a sentinel value on underflow.'],
    ['Expression Evaluation','Stacks are essential for evaluating postfix expressions and converting infix to postfix (Shunting Yard algorithm). They also power bracket matching — push opening brackets, pop and match on closing brackets. Time: O(n) for expression of length n.'],
    ['Stack Complexity Summary','Push: O(1) | Pop: O(1) | Peek: O(1) | Search: O(n). Space: O(n) for n elements. Array-based stacks have fixed capacity; linked-list stacks grow dynamically but use extra pointer space per element.']],
 4:[['FIFO Principle','A queue follows First In, First Out — like a line at a ticket counter. The element that enters first is served first. This is the opposite of a stack\'s LIFO behavior and models real-world waiting scenarios.'],
    ['Enqueue','Enqueue adds an element at the rear (back) of the queue. Time: O(1). The rear pointer advances to accommodate the new element. In array-based queues, this may wrap around in circular implementations.'],
    ['Dequeue','Dequeue removes the element from the front of the queue. Time: O(1). The front pointer advances. The removed element is the oldest one in the queue — the one that has been waiting the longest.'],
    ['Circular Queue','In a linear array-based queue, dequeuing wastes front slots. A circular queue wraps the rear pointer back to index 0 when it reaches the end, reusing freed space. This avoids the O(n) shifting problem.'],
    ['Priority Queue','A priority queue serves the highest-priority element first, regardless of arrival order. Typically implemented using a binary heap. Enqueue (insert): O(log n), Dequeue (extract-max/min): O(log n). Used in Dijkstra\'s algorithm and task scheduling.'],
    ['Queue Complexity Summary','Enqueue: O(1) | Dequeue: O(1) | Peek: O(1) | Search: O(n). Space: O(n). Priority Queue — Insert: O(log n) | Extract: O(log n). Queues are ideal for BFS, scheduling, and buffering scenarios.']],
 5:[['Binary Tree','A binary tree is a hierarchical structure where each node has at most two children (left and right). The topmost node is the root. Trees enable O(log n) operations when balanced, far better than O(n) linear structures.'],
    ['Binary Search Tree (BST)','A BST enforces an ordering rule: all values in the left subtree < node < all values in the right subtree. This enables binary search on a tree structure. Search/Insert/Delete are O(h) where h is the tree height — O(log n) when balanced, O(n) when degenerate.'],
    ['Tree Traversals','Inorder (Left→Root→Right) yields sorted order in a BST. Preorder (Root→Left→Right) is used for copying trees. Postorder (Left→Right→Root) is used for deletion. Level-order uses a queue (BFS). All are O(n) time and O(h) space.'],
    ['AVL Tree','An AVL tree is a self-balancing BST that maintains |height(left) − height(right)| ≤ 1 at every node. After each insert/delete, it performs rotations (single or double) to restore balance. Guarantees O(log n) for all operations.'],
    ['Binary Heap','A complete binary tree where every parent is ≥ children (max-heap) or ≤ children (min-heap). Stored as an array: parent at i, children at 2i+1 and 2i+2. Insert and extract are O(log n). Building a heap from n elements is O(n).'],
    ['Tree Complexity Summary','BST Average — Search/Insert/Delete: O(log n). BST Worst (skewed): O(n). AVL/Red-Black: O(log n) guaranteed. Heap — Insert: O(log n), Extract-min/max: O(log n), Build: O(n). Space: O(n) for all tree types.']],
 6:[['Nodes & Edges','A graph consists of vertices (nodes) connected by edges (relationships). Edges can be directed (one-way) or undirected (two-way), weighted or unweighted. Represented as adjacency list (O(V+E) space) or adjacency matrix (O(V²) space).'],
    ['BFS — Breadth-First Search','BFS explores all neighbors at the current depth before moving deeper, using a queue. It finds the shortest path in unweighted graphs. Time: O(V+E), Space: O(V). Used for level-order traversal, shortest path, and connectivity checks.'],
    ['DFS — Depth-First Search','DFS plunges as deep as possible along each branch before backtracking, using a stack or recursion. Time: O(V+E), Space: O(V). Used for cycle detection, topological sorting, connected components, and path finding.'],
    ['Shortest Path (Unweighted)','In an unweighted graph, BFS guarantees the shortest path (fewest edges) from source to all reachable nodes. Track the parent of each node during BFS to reconstruct the actual path. Time: O(V+E).'],
    ['Dijkstra\'s Algorithm','Finds the shortest weighted path from a source to all nodes (no negative weights). Uses a priority queue (min-heap) to always process the closest unvisited node. Time: O((V+E) log V) with a binary heap. The gold standard for GPS navigation.'],
    ['Graph Complexity Summary','BFS/DFS: O(V+E) time, O(V) space. Dijkstra: O((V+E) log V) with min-heap. Bellman-Ford (handles negative weights): O(V·E). Adjacency list: O(V+E) space. Adjacency matrix: O(V²) space. Choose representation based on graph density.']],
 7:[['Mixed Mastery','Every data structure and algorithm you\'ve learned converges here. Arrays, linked lists, stacks, queues, trees, and graphs — each is a weapon in your arsenal. The key is pattern recognition: knowing which tool fits each problem.'],
    ['Pattern Recognition','Recognize problem signatures: need LIFO? → Stack. FIFO? → Queue. Sorted access? → BST/Heap. Shortest path? → BFS/Dijkstra. The ability to map a problem to the right data structure is what separates good programmers from great ones.'],
    ['The Emperor','The final challenge combines all six worlds. You must demonstrate mastery across every complexity class — from O(1) access to O(V+E) graph traversals. Conquer this, and you earn the title of DSA Legend.']],
};

  const lines = document.querySelectorAll('#mission-hologram .code-visualizer .line');

    if (idx === lineIdx) l.classList.add('active');
    else l.classList.remove('active');

function syntaxHighlight(line) {
  const trimmed = line.trim();
  if (trimmed.startsWith('//')) {
    return `<span class="code-comment">${line}</span>`;
  }
  let escaped = line.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  function highlightPart(code) {
    let res = code;
    res = res.replace(/(['"`])(.*?)\1/g, '<span class="code-string">$1$2$1</span>');
    const keywords = ['let', 'const', 'var', 'function', 'return', 'for', 'while', 'if', 'else', 'true', 'false', 'new', 'class'];
    keywords.forEach(kw => {
      const re = new RegExp(`\\b${kw}\\b`, 'g');
      res = res.replace(re, `<span class="code-keyword">${kw}</span>`);
    });
    res = res.replace(/\b(\d+)\b/g, '<span class="code-number">$1</span>');
    const properties = ['Math\\.floor', 'Math\\.max', 'Math\\.min', 'length', 'push', 'pop', 'shift', 'unshift', 'splice', 'next', 'neighbors', 'visited', 'insert', 'inorderWalk', 'dfs', 'bfs'];
    properties.forEach(prop => {
      const cleanProp = prop.replace('\\', '');
      const re = new RegExp(`\\b${prop}\\b`, 'g');
      res = res.replace(re, `<span class="code-builtin">${cleanProp}</span>`);
    });
    return res;
  }
  const commentIdx = escaped.indexOf('//');
  if (commentIdx !== -1) {
    const codePart = escaped.substring(0, commentIdx);
    const commentPart = escaped.substring(commentIdx);
    return highlightPart(codePart) + `<span class="code-comment">${commentPart}</span>`;
  }
  return highlightPart(escaped);
}

function completionPct(){
  let total=0,done=0;
  WORLDS.forEach(o=>{
    const w=S.worlds[o.id];
    const r=ROADMAPS[o.id].length, m=missionsFor(o.id).length;
    total+=r+m+2; // +boss +quiz
    done+=Math.min(w.roadmap,r)+Object.keys(w.missions).length+(w.boss?1:0)+(w.quiz>0?1:0);

  return Math.round(done/total*100);
}

// Decode Google JWT credential (no library needed - base64 decode the payload)
function decodeJwt(token){
  try{
    const base64 = token.split('.')[1].replace(/-/g,'+').replace(/_/g,'/');
    const json = decodeURIComponent(atob(base64).split('').map(c=>'%'+('00'+c.charCodeAt(0).toString(16)).slice(-2)).join(''));
    return JSON.parse(json);
  }catch(e){ return null; }
}

function handleGoogleAuth(response){

function startLandingAnimation() {
  const canvas = document.getElementById('landing-canvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  
  let w, h;
  function resize() {
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);
  
  // Clean, slow floating graph network (monochromatic style)
  const nodes = [];
  const maxNodes = 30;
  for (let i = 0; i < maxNodes; i++) {
    nodes.push({
      x: Math.random() * w,
      y: Math.random() * h,
      vx: (Math.random() - 0.5) * 0.4, // very slow drift
      vy: (Math.random() - 0.5) * 0.4,
      radius: Math.random() * 2 + 1.5,
      color: 'rgba(200, 200, 200, 0.25)'
    });
  }

  function updateAndDraw() {
    // Pure solid black background
    ctx.fillStyle = '#000000';
    ctx.fillRect(0, 0, w, h);
    
    // Draw connections
    ctx.lineWidth = 0.8;
    for (let i = 0; i < nodes.length; i++) {
      const n = nodes[i];
      n.x += n.vx;
      n.y += n.vy;
      
      // Wrap around bounds softly
      if (n.x < 0) n.x = w;
      if (n.x > w) n.x = 0;
      if (n.y < 0) n.y = h;
      if (n.y > h) n.y = 0;
      
      for (let j = i + 1; j < nodes.length; j++) {
        const other = nodes[j];
        const dx = n.x - other.x;
        const dy = n.y - other.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        
        if (dist < 130) {
          ctx.strokeStyle = `rgba(255, 255, 255, ${(1 - dist/130) * 0.08})`;
          ctx.beginPath();
          ctx.moveTo(n.x, n.y);
          ctx.lineTo(other.x, other.y);
          ctx.stroke();
        }
      }
      
      // Draw Node point
      ctx.fillStyle = n.color;
      ctx.beginPath();
      ctx.arc(n.x, n.y, n.radius, 0, Math.PI * 2);
      ctx.fill();
    }

    landingAnimId = requestAnimationFrame(updateAndDraw);
  }
  
  updateAndDraw();
}

    const username = document.getElementById('custom-username').value.trim();
    const password = document.getElementById('custom-password').value.trim();

    if (!username) { toast('❌', 'Error', 'Hero name cannot be empty.'); return; }
    if (username.length < 3) { toast('❌', 'Error', 'Hero name must be at least 3 characters.'); return; }
    if (!/^[a-zA-Z0-9 ]+$/.test(username)) { toast('❌', 'Error', 'Hero name must be alphanumeric.'); return; }
    if (!password) { toast('❌', 'Error', 'Password cannot be empty.'); return; }
    if (password.length < 4) { toast('❌', 'Error', 'Password must be at least 4 characters.'); return; }

    const accounts = getAccounts();
    const key = username.toLowerCase();
    const account = accounts[key];

    if (account) {
      // Log In
      if (account.password !== password) {
        toast('❌', 'Login Failed', 'Incorrect password.');
        return;
      }
      googleUser = { name: account.username, email: '', isCustomAuth: true };
      saveAuth(googleUser);
      S = account.saveData || freshState();
      S.name = account.username;
      if (!S.avatar) S.avatar = account.avatar || '🧙';
      save();
      
      document.getElementById('loginpage').classList.add('hidden');
      document.getElementById('app').style.display = '';
      boot();
      toast('⚔️', 'Welcome Back', `Entering the realm as ${account.username}...`);
    } else {
      // Register
      const fresh = freshState();
      fresh.name = username;
      fresh.avatar = '🧙';
      
      accounts[key] = {
        username: username,
        password: password,
        avatar: '🧙',
        saveData: fresh
      };
      saveAccounts(accounts);

      googleUser = { name: username, email: '', isCustomAuth: true };
      saveAuth(googleUser);
      S = fresh;
      save();
      unlock('first_step');

      document.getElementById('loginpage').classList.add('hidden');
      document.getElementById('app').style.display = '';
      boot();
      toast('⚔️', 'Hero Created', 'Welcome to the cyber-fantasy realm!');
    }
  };

  const renderGButton = () => {
    const container = document.getElementById('googleBtnContainer');
    if(container && ensureGoogleInit()){
      google.accounts.id.renderButton(container, {
        theme: 'filled_black',
        size: 'large',
        shape: 'pill',
        text: 'signin_with',
        width: 280,
      });
    }
  };
  
  renderGButton();
  if(!_gsiInitialized){
    let attempts = 0;
    const tryInit = setInterval(() => {
      if(ensureGoogleInit()){
        clearInterval(tryInit);
        renderGButton();
      } else if(attempts++ > 20) {
        clearInterval(tryInit);
      }
    }, 200);
  }

  // If user already authed in this session, go directly
  const existing = getAuth();
  if(existing){
    googleUser = existing;
    const accounts = getAccounts();
    let key = '';
    if (existing.email) {
      key = "google_" + existing.email.toLowerCase();
    } else if (existing.name) {
      key = existing.name.toLowerCase();
    }
    if (key && accounts[key] && accounts[key].saveData) {
      S = accounts[key].saveData;
      localStorage.setItem('dsa_legends_save', JSON.stringify(S));
    }
    if (S.name && S.name.trim() !== '') {
      document.getElementById('loginpage').classList.add('hidden');
      document.getElementById('app').style.display = '';
      boot();
    }
  }
}

  const mouseX = e.clientX - rect.left;
  const mouseY = e.clientY - rect.top;
  const x = ((mouseX / rect.width) * 100).toFixed(1);
  const y = ((mouseY / rect.height) * 100).toFixed(1);
  
  const coordVal = document.getElementById('hud-coord-val');
  if (coordVal && !window.hoveringNode) {
    coordVal.textContent = `X: ${x}% / Y: ${y}%`;
  }
};

window.resetMapMouse = function(e) {
  const coordVal = document.getElementById('hud-coord-val');
  if (coordVal) {

};

function randArr(n,max=9){return Array.from({length:n},()=>Math.floor(Math.random()*max)+1);}
const ARRAY_MISSIONS=[
  {key:'idx',icon:'💎',title:'Crystal Collection',listType:'Static Array',teaches:'Indexing — grab the crystal at the exact index.',
   demoCode:`// Array Indexing — O(1) time
const arr = [10, 20, 30, 40, 50];
const target = arr[2]; // retrieves 30
console.log(target);`},
  {key:'trav',icon:'🚶',title:'Traversal Adventure',listType:'Static Array',teaches:'Visit each cell left to right, in order.',
   demoCode:`// Array Traversal — O(N) time
const arr = [10, 20, 30, 40, 50];
for (let i = 0; i < arr.length; i++) {
  console.log(arr[i]);
}`},
  {key:'ins',icon:'📥',title:'Treasure Insertion',listType:'Static Array',teaches:'Insert & shift elements right.',
   demoCode:`// Array Insertion — O(N) time (due to shifts)
function insertAt(arr, index, element) {
  for (let i = arr.length - 1; i > index; i--) {
    arr[i] = arr[i - 1]; // shift right
  }
  arr[index] = element;
}`},
  {key:'del',icon:'🧹',title:'Corrupted Removal',listType:'Static Array',teaches:'Delete & shift elements left.',
   demoCode:`// Array Deletion — O(N) time (due to shifts)
function deleteAt(arr, index) {
  for (let i = index; i < arr.length - 1; i++) {
    arr[i] = arr[i + 1]; // shift left
  }
  arr[arr.length - 1] = 0; // clear last element
}`},
  {key:'lin',icon:'🔦',title:'Search Dungeon',listType:'Static Array',teaches:'Linear search — scan for the target.',
   demoCode:`// Linear Search — O(N) time
function linearSearch(arr, target) {
  for (let i = 0; i < arr.length; i++) {
    if (arr[i] === target) return i; // found index
  }
  return -1; // not found
}`},
  {key:'bin',icon:'⚡',title:'Binary Search Temple',listType:'Sorted Array',teaches:'Halve a sorted range each guess.',
   demoCode:`// Binary Search — O(log N) time
function binarySearch(arr, target) {
  let low = 0, high = arr.length - 1;
  while (low <= high) {
    let mid = Math.floor((low + high) / 2);
    if (arr[mid] === target) return mid;
    if (arr[mid] < target) low = mid + 1;
    else high = mid - 1;
  }
  return -1;
}`},
  {key:'sort',icon:'⚔️',title:'Sorting Arena',listType:'Unsorted Array',teaches:'Wield a sorting blade to order the chaos.',
   demoCode:`// Bubble Sort — O(N^2) time
function bubbleSort(arr) {
  let n = arr.length;
  for (let i = 0; i < n - 1; i++) {
    for (let j = 0; j < n - i - 1; j++) {
      if (arr[j] > arr[j + 1]) {
        let temp = arr[j];
        arr[j] = arr[j + 1];
        arr[j + 1] = temp;
      }
    }
  }
}`}
];

}

function bumpCombo(good){
  if(good){_combo++;} else {_combo=0;}
  const el=document.getElementById('combo'); if(!el)return;
  if(_combo===0){el.textContent=''; return;}
  el.textContent=(_combo>=5?'🔥 ':'')+'×'+_combo+' COMBO'+(_combo>=10?' 💥':'');
  el.className='combo-counter'+(_combo>=10?' ultra':_combo>=5?' fire':'');
  if(_combo===5)showStreakMsg('🔥 ON FIRE!');
  if(_combo===10)showStreakMsg('💥 UNSTOPPABLE!');
  if(_combo===15)showStreakMsg('⚡ GODLIKE!');
}
function showStreakMsg(msg){
  const arena=document.getElementById('arena'); if(!arena)return;
  const d=document.createElement('div'); d.className='streak-msg'; d.textContent=msg;
  arena.appendChild(d); setTimeout(()=>d.remove(),1300);
}
function showBonus(el,text){
  const b=document.createElement('div'); b.className='bonus-popup'; b.textContent=text;
  b.style.left=el.offsetLeft+'px'; b.style.top=el.offsetTop+'px';
  const arena=document.getElementById('arena'); if(arena)arena.appendChild(b);
  setTimeout(()=>b.remove(),1000);
}
function shakeScreen(){const s=document.getElementById('scr');if(s){s.classList.add('screen-shake');setTimeout(()=>s.classList.remove('screen-shake'),350);}}
function clearMission(id,key,xp,coins){
  const elapsed=((Date.now()-_missionStart)/1000).toFixed(1);
  const w=S.worlds[id]; if(!w.missions[key]){w.missions[key]=true; S.stats.missionsCleared++;}
  // Track best time
  if(!S.stats.bestTimes)S.stats.bestTimes={};
  if(!S.stats.bestTimes[key]||parseFloat(elapsed)<S.stats.bestTimes[key]){S.stats.bestTimes[key]=parseFloat(elapsed);}
  // Combo bonus
  const comboBonus=Math.min(_combo*5,50);
  const timeBonus=Math.max(0,Math.round(30-parseFloat(elapsed)))*2;
  const totalXP=xp+comboBonus+timeBonus;
  const totalCoins=coins+Math.round(comboBonus/2);
  addXP(totalXP); addCoins(totalCoins);
  const map={idx:'idx',trav:'trav',ins:'ins',del:'del',lin:'lin',bin:'bin',sort:'sort'};
  if(id===1&&map[key])unlock(map[key]);
  // Save total solve time for leaderboard
  if(!S.stats.totalSolveTime)S.stats.totalSolveTime=0;
  S.stats.totalSolveTime+=parseFloat(elapsed);
  save();
  modal(`<div class="loot">🎉</div><div class="eyebrow">Mission Cleared</div>
    <div class="big" style="font-size:26px">VICTORY</div>
    <p class="dim" style="margin:8px 0">Completed in <b style="color:var(--gold)">${elapsed}s</b>${_combo>=3?' · <b style="color:var(--pink)">'+_combo+'× combo!</b>':''}</p>
    <div class="rewardrow"><span class="chip">+${totalXP} XP${comboBonus?'(+'+comboBonus+' combo)':''}</span><span class="chip">+${totalCoins} 🪙</span>${timeBonus>0?'<span class="chip">⚡+'+timeBonus+' speed</span>':''}</div>
    <button class="btn green" onclick="closeModal();go('world',${id})">Continue</button>`);
}

/* --- Mission 1: Indexing --- */
function mIndex(){
  const arr=randArr(7), target=Math.floor(Math.random()*arr.length); let got=0, rounds=4, cur=0;
  arenaShell('Crystal Collection','Click the crystal stored at the requested index.',`
    <div class="prompt" id="pr"></div>
    <div class="cells" id="cells"></div>
    <div class="feedback" id="fb"></div>`);
  function round(){
    const tgt=Math.floor(Math.random()*arr.length);
    setTimeout(() => highlightCodeLine(2), 50);
    document.getElementById('pr').innerHTML=`Collect the crystal at index <b>${tgt}</b>  <span class="dim">(${got}/${rounds})</span>`;
    const c=document.getElementById('cells'); c.innerHTML='';
    arr.forEach((v,i)=>{
      const d=document.createElement('div'); d.className='acell';
      d.innerHTML=`<div class="box">${v}💎</div><div class="idx">[${i}]</div>`;
      d.querySelector('.box').onclick=()=>{
        if(i===tgt){d.classList.add('good'); got++; cur++; bumpCombo(true); showBonus(d,'+'+(_combo*5)+' combo');
          document.getElementById('fb').className='feedback win';
          document.getElementById('fb').textContent=`✓ Index ${i} accessed in O(1) time. Address calculated directly without scanning.`;
          if(cur>=rounds){setTimeout(()=>clearMission(1,'idx',60,30),1200);}
          else setTimeout(round,1800);
        }else{d.classList.add('bad'); bumpCombo(false); shakeScreen();
          document.getElementById('fb').className='feedback lose';
          document.getElementById('fb').textContent=`✗ That was index ${i}. Zero-based indexing means first element is at index 0, second at 1, etc.`;
          setTimeout(()=>d.classList.remove('bad'),500);}
      };
      c.appendChild(d);
    });
  }
  round();
}
/* --- Mission 2: Traversal --- */
function mTraverse(){
  const arr=randArr(8); let next=0;
  setTimeout(() => highlightCodeLine(1), 50);
  arenaShell('Array Traversal','Step through every cell in order, 0 → n-1.',`
    <div class="prompt">Visit index <b id="want">0</b> next.</div>
    <div class="cells" id="cells"></div>
    <div class="feedback" id="fb"></div>`);
  const c=document.getElementById('cells');
  arr.forEach((v,i)=>{const d=document.createElement('div'); d.className='acell';
    d.innerHTML=`<div class="box">${v}</div><div class="idx">[${i}]</div>`;
    d.querySelector('.box').onclick=()=>{
      if(i===next){highlightCodeLine(2); d.classList.add('good'); next++; bumpCombo(true); showBonus(d,'✓ '+i);
        document.getElementById('fb').className='feedback win';
        document.getElementById('fb').textContent=`✓ Visited index ${i} (Value: ${arr[i]}). In traversal, we step through each element one-by-one, taking O(n) total time.`;
        if(next>=arr.length){setTimeout(()=>clearMission(1,'trav',60,30),1200);}
        else document.getElementById('want').textContent=next;
      }else{d.classList.add('bad'); bumpCombo(false); shakeScreen(); setTimeout(()=>d.classList.remove('bad'),400);
        document.getElementById('fb').className='feedback lose';
        document.getElementById('fb').textContent=`✗ Out of order! Array traversal must visit sequentially: index 0 to n-1. You must visit index ${next} next.`;}
    };
    c.appendChild(d);});
}
/* --- Mission 3: Insertion --- */
function mInsert(){
  let arr=randArr(6); const at=Math.floor(Math.random()*(arr.length+1)); const val=Math.floor(Math.random()*9)+1;
  setTimeout(() => highlightCodeLine(1), 50);
  arenaShell('Treasure Insertion',`Insert treasure ${val}💠 at index ${at} — pick the slot where it belongs.`,`
    <div class="prompt">Click the gap at index <b>${at}</b> to insert <b>${val}💠</b> (everything to the right shifts).</div>
    <div class="cells" id="cells"></div>
    <div class="feedback" id="fb"></div>`);
  render();
  function render(){
    const c=document.getElementById('cells'); c.innerHTML='';
    arr.forEach((v,i)=>{const d=document.createElement('div'); d.className='acell';
      d.innerHTML=`<div class="box">${v}</div><div class="idx">[${i}]</div>`;
      d.querySelector('.box').onclick=()=>pick(i); c.appendChild(d);});
    // allow clicking the trailing slot too
    const tail=document.createElement('div'); tail.className='acell';
    tail.innerHTML=`<div class="box" style="opacity:.4">＋</div><div class="idx">[${arr.length}]</div>`;
    tail.querySelector('.box').onclick=()=>pick(arr.length); c.appendChild(tail);
  }
  function pick(i){
    if(i===at){highlightCodeLine(5);
      arr.splice(at,0,val); render();
      const targetBox = document.querySelectorAll('.acell .box')[at];
      targetBox.parentElement.classList.add('good');
      bumpCombo(true); showBonus(targetBox, '🎯 INSERTED!');
      document.getElementById('fb').className='feedback win';
      document.getElementById('fb').textContent=`✓ Inserted at index ${at}. To make space, all elements from index ${at} to the end shift 1 slot to the right. Worst case takes O(n) time.`;
      setTimeout(()=>clearMission(1,'ins',70,35),1500);
    }else{highlightCodeLine(3);
      bumpCombo(false); shakeScreen();
      document.getElementById('fb').className='feedback lose';
      document.getElementById('fb').textContent=`✗ Target was index ${at}. Clicking index ${i} would insert there, shifting elements from index ${i} right.`;
    }
  }
}
/* --- Mission 4: Deletion --- */
function mDelete(){
  let arr=randArr(7); const bad=Math.floor(Math.random()*arr.length);
  setTimeout(() => highlightCodeLine(1), 50);
  arenaShell('Corrupted Crystal Removal',`Delete the corrupted crystal at index ${bad} — the rest shift left.`,`
    <div class="prompt">Remove the crystal at index <b>${bad}</b> 💀</div>
    <div class="cells" id="cells"></div><div class="feedback" id="fb"></div>`);
  render();
  function render(){const c=document.getElementById('cells');c.innerHTML='';
    arr.forEach((v,i)=>{const d=document.createElement('div');d.className='acell'+(i===bad?' bad':'');
      d.innerHTML=`<div class="box">${i===bad?'☠️':v}</div><div class="idx">[${i}]</div>`;
      d.querySelector('.box').onclick=()=>{
        if(i===bad){highlightCodeLine(3); arr.splice(bad,1);render();
          bumpCombo(true); showStreakMsg('💥 REMOVED!');
          document.getElementById('fb').className='feedback win';
          document.getElementById('fb').textContent=`✓ Deleted index ${bad}. Elements to the right of index ${bad} must shift 1 slot to the left to close the gap. Worst case takes O(n) time.`;
          setTimeout(()=>clearMission(1,'del',70,35),1500);
        }else{highlightCodeLine(1); bumpCombo(false); shakeScreen();
          document.getElementById('fb').className='feedback lose';
          document.getElementById('fb').textContent=`✗ Healthy cell! Deleting requires shifting subsequent items, costing O(n) worst-case time to maintain contiguous storage.`;}
      }; c.appendChild(d);});}
}
/* --- Mission 5: Linear Search --- */
function mLinear(){
  const arr=randArr(9,12); const t=arr[Math.floor(Math.random()*arr.length)]; let scan=0;
  setTimeout(() => highlightCodeLine(1), 50);
  arenaShell('Search Dungeon',`Linear search: scan left to right until you find ${t}.`,`
    <div class="prompt">Find the chamber holding <b>${t}</b>. Click cells in order to scan.</div>
    <div class="cells" id="cells"></div><div class="feedback" id="fb"></div>`);
  const c=document.getElementById('cells');
  arr.forEach((v,i)=>{const d=document.createElement('div');d.className='acell';
    d.innerHTML=`<div class="box">${v}</div><div class="idx">[${i}]</div>`;
    d.querySelector('.box').onclick=()=>{
      if(i!==scan){bumpCombo(false); shakeScreen(); document.getElementById('fb').className='feedback lose';
        document.getElementById('fb').textContent='✗ Out of order! Linear search scans sequentially — check index '+scan+'.';return;}
      if(v===t){highlightCodeLine(3); d.classList.add('good');bumpCombo(true);showBonus(d,'🎯 FOUND!');
        document.getElementById('fb').className='feedback win';
        document.getElementById('fb').textContent=`✓ Found target ${t} at index ${i}. Since the array is unsorted, we check every cell one-by-one from left to right, taking O(n) worst-case time.`;
        setTimeout(()=>clearMission(1,'lin',70,35),1500);
      }else{highlightCodeLine(2); d.classList.add('dim');scan++;bumpCombo(true);
        document.getElementById('fb').className='feedback win';
        document.getElementById('fb').textContent=`✓ Scanned index ${i} (value: ${v}) — not the target. Moving to index ${scan}.`;}

    function updateStep(){

      let lineToHighlight = -1;
      if (wp[2] === 'bubble') {
        if (step.desc && step.desc.includes('swap')) lineToHighlight = 4;
        else lineToHighlight = 3;
      } else if (wp[2] === 'selection') {
        if (step.desc && step.desc.includes('Swap')) lineToHighlight = 6;
        else lineToHighlight = 4;
      } else if (wp[2] === 'insertion') {
        if (step.desc && step.desc.includes('Place')) lineToHighlight = 7;
        else if (step.desc && step.desc.includes('shift')) lineToHighlight = 4;
        else lineToHighlight = 2;
      } else if (wp[2] === 'merge') {
        lineToHighlight = 7;
      }
      if (lineToHighlight !== -1) highlightCodeLine(lineToHighlight);

      paint(step.arr,isLast,step.hi);
      counter.textContent=`Step ${stepIdx} / ${steps.length-1}`;
      prevBtn.disabled=stepIdx===0;
      nextBtn.disabled=isLast && completed;

      document.getElementById('fb').className='feedback win';
      document.getElementById('fb').textContent=step.desc || 'Initial state. Click "Forward" to begin sorting.';

      if(isLast && !completed){
        completed=true;

      if(stepIdx<steps.length-1){stepIdx++; updateStep();}

function genSteps(algo,a){
  const steps=[]; const snap=(hi,desc)=>steps.push({arr:[...a],hi,desc});
  if(algo==='bubble'){
    for(let i=0;i<a.length;i++) {
      for(let j=0;j<a.length-1-i;j++){
        let desc=`Comparing indices [${j}] (${a[j]}) and [${j+1}] (${a[j+1]}).`;
        if(a[j]>a[j+1]){
          [a[j],a[j+1]]=[a[j+1],a[j]];
          desc += ` Out of order (${a[j+1]} > ${a[j]}), so they swap!`;
        } else {
          desc += ` Already in order, no swap.`;
        }
        snap([j,j+1], desc);
      }
    }
  }
  else if(algo==='selection'){
    for(let i=0;i<a.length;i++){
      let m=i;
      for(let j=i+1;j<a.length;j++) if(a[j]<a[m]) m=j;
      let desc=`Scan remaining unsorted items starting at index ${i}. Found minimum value ${a[m]} at index ${m}.`;
      if(m!==i){
        [a[i],a[m]]=[a[m],a[i]];
        desc += ` Swap it with index ${i} (${a[m]}).`;
      } else {
        desc += ` Index ${i} is already the minimum, no swap needed.`;
      }
      snap([i,m], desc);
    }
  }
  else if(algo==='insertion'){
    for(let i=1;i<a.length;i++){
      const key=a[i];
      let j=i-1;
      snap([i], `Outer loop: Select key value ${key} at index ${i} to insert.`);
      while(j>=0 && a[j]>key){
        a[j+1]=a[j];
        snap([j,j+1], `Since ${a[j]} > key (${key}), shift ${a[j]} right from index ${j} to index ${j+1}.`);
        j--;
      }
      a[j+1]=key;
      snap([j+1], `Place key ${key} into its sorted position at index ${j+1}.`);
    }
  }
  else if(algo==='merge'){
    const ms=(l,r)=>{
      if(r-l<=1)return;
      const m=(l+r)>>1;
      ms(l,m);
      ms(m,r);
      const t=[];
      let i=l,j=m;
      while(i<m&&j<r){
        if(a[i]<=a[j]) t.push(a[i++]);
        else t.push(a[j++]);
      }
      while(i<m)t.push(a[i++]);
      while(j<r)t.push(a[j++]);
      for(let k=0;k<t.length;k++){
        a[l+k]=t[k];
        snap([l+k], `Merge Sort: Merging sorted sub-lists. Placing value ${t[k]} back into index ${l+k}.`);
      }
    };
    ms(0,a.length);
  }
  return steps;
}

/* Game 1 — Wire the Nodes: click nodes in sequence to chain pointers */
function wireNodes(id,key){
  const vals = randArr(5,9);

  arenaShell('Wire the Nodes', 'Click each node left-to-right to chain the next pointer.',`
    <div class="prompt" id="pr">Connect node <b>${vals[0]}</b> → <b>${vals[1]}</b> by clicking them in order.</div>

  function draw(){
    const chain = document.getElementById('chain');

    vals.forEach((v,i)=>{
      const isWired = i < wired;
      const isNext  = i === wired;
      const cell = document.createElement('div');
      cell.style.cssText = 'display:flex;align-items:center;gap:4px';
      const box = document.createElement('div');
      box.className = 'acell';

          fb.textContent=`✓ Pointer set: ${vals[wired-1]}.next → ${vals[wired]}. A pointer stores the memory address of the next node.`;
          document.getElementById('pr').innerHTML=`Connect <b>${vals[wired-1]}</b> → <b>${vals[wired]}</b>`;
        } else {
          fb.textContent='✓ Last node.next = null. Chain complete! A linked list ends when next pointer is null.';
        }
        draw();

      };
      cell.appendChild(box);
      if(i<vals.length-1){

        arr.innerHTML = isWired ? '<span style="color:var(--green);font-size:18px">→</span>' : '<span style="color:var(--dim);font-size:18px">·→·</span>';

  let attempts = 0;
  arenaShell('Cycle Hunt','One node\'s next pointer loops back and creates a cycle. Click it!',`

    <div style="font-family:var(--mono);font-size:12px;color:var(--dim);text-align:center;margin-bottom:8px">The last node's next wraps back to one of the middle nodes (forming ♻️ a cycle)</div>
    <div class="feedback" id="fb"></div>`);
  function draw(){
    const chain = document.getElementById('cycle-chain');
    chain.innerHTML = '';

      box.onclick = ()=>{

          document.getElementById('fb').className='feedback win';
          document.getElementById('fb').innerHTML=`✓ Correct! Node <b>${vals[cycleIdx]}</b> (index ${cycleIdx}) is where the tail's next points back, creating a cycle. Floyd's algorithm detects this in O(n) with O(1) space.`;
          box.querySelector('div').style.borderColor='var(--green)';
          setTimeout(()=>clearMission(id,key,85,42),1800);
        } else {
          shakeScreen();
          document.getElementById('fb').className='feedback lose';
          document.getElementById('fb').textContent=`✗ Not this one. Hint: The cycle entry is neither the head nor the tail. Attempts: ${attempts}.`;
        }

        const arr=document.createElement('span');
