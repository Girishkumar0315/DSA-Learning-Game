function reverseList(id,key){
  let arr = randArr(5,9);
  let steps = 0;
  const total = arr.length;
  let reversed = [];
  let remaining = [...arr];
  arenaShell('Reverse the Chain','Re-wire pointers to reverse the linked list one node at a time.',`
    <div class="prompt" id="pr">Original list — click Reverse Step to flip one node's pointer.</div>
    <div id="orig-chain" style="display:flex;align-items:center;gap:6px;justify-content:center;margin:10px 0"></div>
    <div style="text-align:center;color:var(--dim);font-size:12px;margin:4px 0">↕ reversing ↕</div>
    <div id="rev-chain" style="display:flex;align-items:center;gap:6px;justify-content:center;margin:10px 0"></div>
    <div class="controls"><button class="btn sm" id="rev-btn">🔄 Reverse Step</button></div>
    <div class="feedback" id="fb"></div>`);
  function draw(){
    // Original (shrinking)
    const orig = document.getElementById('orig-chain');
    orig.innerHTML = remaining.map((v,i)=>
      `<div class="acell"><div class="box" style="border-color:var(--blue)">${v}</div></div>${i<remaining.length-1?'<span style="color:var(--dim)">→</span>':'<span style="color:var(--dim)">→null</span>'}`
    ).join('');
    // Reversed (growing)
    const rev = document.getElementById('rev-chain');
    rev.innerHTML = reversed.length === 0
      ? '<span class="dim">empty</span>'
      : reversed.map((v,i)=>
          `<div class="acell"><div class="box" style="border-color:var(--green)">${v}</div></div>${i<reversed.length-1?'<span style="color:var(--green)">→</span>':'<span style="color:var(--dim)">→null</span>'}`
        ).join('');
  }
  draw();
  document.getElementById('rev-btn').onclick = ()=>{
    if(remaining.length===0){return;}
    highlightCodeLine(3);
    const node = remaining.shift();
    reversed.unshift(node);
    steps++;
    draw();
    const fb = document.getElementById('fb');
    fb.className = 'feedback win';
    if(remaining.length>0){
      fb.textContent = `✓ Moved node ${node} to front of reversed list. prev pointer now points backward. Steps: ${steps}/${total}.`;
      document.getElementById('pr').innerHTML = `Reversing… <b>${steps}</b> of ${total} nodes re-wired.`;
    } else {
      fb.textContent = `✓ All ${total} pointers reversed! prev→current→next became null←…←head. Time complexity: O(n).`;
      document.getElementById('rev-btn').disabled = true;
      setTimeout(()=>clearMission(id,key,90,45),1800);
    }
  };
}

/* Game 4 — Delete the Node: choose the correct predecessor node to fix the pointer */
function deleteNode(id,key){
  const vals = randArr(5,9);
  const delIdx = 1 + Math.floor(Math.random()*(vals.length-2)); // never head or tail
  let attempts = 0;
  arenaShell('Delete the Node',`Remove node <b>${vals[delIdx]}</b> from the list by clicking its predecessor.`,`
    <div class="prompt">To delete node <b style="color:var(--pink)">${vals[delIdx]}</b>, click its <b>predecessor</b> (the node just before it) to fix the pointer.</div>
    <div id="del-chain" style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;justify-content:center;margin:16px 0"></div>
    <div style="font-family:var(--mono);font-size:12px;color:var(--dim);text-align:center;margin-bottom:8px">Rule: predecessor.next = target.next (skip the deleted node)</div>
    <div class="feedback" id="fb"></div>`);
  function draw(deleted){
    const chain = document.getElementById('del-chain');
    chain.innerHTML = '';
    vals.forEach((v,i)=>{
      if(deleted && i===delIdx) return; // skip deleted node
      const cell = document.createElement('div');
      cell.style.cssText='display:flex;align-items:center;gap:4px';
      const box = document.createElement('div');
      box.className='acell';
      const isTarget = i===delIdx;
      const isPred   = i===delIdx-1;
      box.innerHTML=`<div class="box" style="border-color:${isTarget?'var(--pink)':isPred?'var(--gold)':'var(--line)'};cursor:${deleted?'default':isPred?'pointer':'not-allowed'};font-size:15px">${v}${isTarget?'<br><span style="font-size:9px;color:var(--pink)">DELETE</span>':''}</div>`;
      if(!deleted) box.onclick = ()=>{
        attempts++;
        if(i===delIdx-1){
          highlightCodeLine(4);
          document.getElementById('fb').className='feedback win';
          document.getElementById('fb').innerHTML=`✓ Correct! node[${i}].next = node[${delIdx+1}] — we skipped node <b>${vals[delIdx]}</b>. The node is now unreachable (garbage collected). O(1) if predecessor is known.`;
          draw(true);
          setTimeout(()=>clearMission(id,key,80,40),1800);
        } else {
          shakeScreen();
          document.getElementById('fb').className='feedback lose';
          document.getElementById('fb').textContent=`✗ Wrong node. To delete node at index ${delIdx}, you must change the pointer of its predecessor at index ${delIdx-1}. Attempts: ${attempts}.`;
        }
      };
      cell.appendChild(box);
      if(i<vals.length-1 && !(deleted && i===delIdx-1)){
        const arrow=document.createElement('span');
        arrow.innerHTML='<span style="color:var(--dim);font-size:18px">→</span>';
        cell.appendChild(arrow);
      }
      chain.appendChild(cell);
    });
  }
  draw(false);
}

/* g3c — Stack Push Panic: push random numbers, type the top value each time */
function stackPushPanic(id,key){
  const seq = randArr(6,9);
  let stack=[], idx=0, mistakes=0;
  arenaShell('Stack Push Panic','Push each number onto the stack and answer: what is the TOP element now?',`
    <div class="prompt" id="pr">Push <b id="nv" style="color:var(--gold);font-size:22px">${seq[0]}</b> onto the stack — then type the new top.</div>
    <div style="display:flex;align-items:flex-end;gap:20px;justify-content:center;margin:12px 0">
      <div style="text-align:center">
        <div class="eyebrow" style="font-size:10px">Remaining</div>
        <div id="rem" style="display:flex;gap:6px;flex-wrap:wrap;justify-content:center;margin-top:6px"></div>
      </div>
      <div style="text-align:center">
        <div class="eyebrow" style="font-size:10px">Stack (top ↑)</div>
        <div id="stk" style="display:flex;flex-direction:column-reverse;align-items:center;gap:4px;min-height:160px;justify-content:flex-start;margin-top:6px"></div>
      </div>
    </div>
    <div class="controls" style="gap:8px">
      <input id="ans" type="number" placeholder="Top value?" style="padding:8px 12px;border-radius:8px;border:1px solid var(--line);background:rgba(255,255,255,0.05);color:var(--txt);font-family:var(--mono);font-size:16px;width:120px;text-align:center">
      <button class="btn sm green" id="pushbtn">⬇️ Push &amp; Check</button>
    </div>
    <div class="feedback" id="fb"></div>`);
  function draw(){
    document.getElementById('rem').innerHTML = seq.slice(idx).map((v,i)=>
      `<div class="acell"><div class="box" style="border-color:${i===0?'var(--gold)':'var(--line)'}">${v}</div></div>`).join('');
    document.getElementById('stk').innerHTML = stack.length
      ? stack.map((v,i)=>`<div class="acell"><div class="box" style="border-color:${i===stack.length-1?'var(--green)':'var(--line)'}">${v}${i===stack.length-1?' 👈top':''}</div></div>`).join('')
      : '<span class="dim">empty</span>';
  }
  draw();
  document.getElementById('pushbtn').onclick=()=>{
    if(idx>=seq.length) return;
    const ans=parseInt(document.getElementById('ans').value);
    const val=seq[idx];
    const fb=document.getElementById('fb');
    if(isNaN(ans)){fb.className='feedback lose';fb.textContent='✗ Enter the top value before pushing!';return;}
    if(ans===val){
      highlightCodeLine(2);
      stack.push(val); idx++;
      draw();
      fb.className='feedback win';
      fb.textContent=`✓ Correct! Pushed ${val}. Top is now ${stack[stack.length-1]}. LIFO — last pushed is always on top.`;
      document.getElementById('ans').value='';
      if(idx>=seq.length){
        document.getElementById('pushbtn').disabled=true;
        setTimeout(()=>{fb.textContent=`🏆 Stack full! Final: [${stack.join(' ← ')}] with top=${stack[stack.length-1]}.`;
          setTimeout(()=>clearMission(id,key,85,42),1400);},600);
      } else {
        document.getElementById('pr').innerHTML=`Push <b id="nv" style="color:var(--gold);font-size:22px">${seq[idx]}</b> — what will the new top be?`;
      }
    } else {
      mistakes++; shakeScreen();
      fb.className='feedback lose';
      fb.textContent=`✗ Wrong! When you push ${val}, it becomes the new top. Stack top = most recently pushed. Mistakes: ${mistakes}.`;
    }
  };
  document.getElementById('ans').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('pushbtn').click();});
}

/* g3d — Stack Pop Blitz: watch the stack, predict what comes out when popped */
function stackPopBlitz(id,key){
  const seq = randArr(5,9);
  let stack=[...seq], mistakes=0;
  arenaShell('Stack Pop Blitz','Predict the correct pop order — which element comes out NEXT?',`
    <div class="prompt">The stack is already built. Pop it — LIFO: <b style="color:var(--gold)">Last In, First Out</b>.</div>
    <div style="display:flex;gap:24px;align-items:flex-start;justify-content:center;margin:12px 0">

      </div>
      <div style="text-align:center">
        <div class="eyebrow" style="font-size:10px">Popped Out</div>
        <div id="popped" style="display:flex;gap:6px;flex-wrap:wrap;justify-content:center;margin-top:6px;min-height:44px"></div>
      </div>

  function draw(){
    document.getElementById('stk2').innerHTML = stack.length
      ? stack.map((v,i)=>`<div class="acell"><div class="box" style="border-color:${i===stack.length-1?'var(--gold)':'var(--line)'}">${v}${i===stack.length-1?' ←top':''}</div></div>`).join('')
      : '<span class="dim">empty</span>';
    document.getElementById('popped').innerHTML = popped.length
      ? popped.map(v=>`<div class="acell"><div class="box" style="border-color:var(--green)">${v}</div></div>`).join('')
      : '<span class="dim">—</span>';
    // Build choices: correct answer + 2 distractors
    if(stack.length>0){
      const correct=stack[stack.length-1];
      const wrong=[...stack.slice(0,-1)].sort(()=>Math.random()-0.5).slice(0,2);
      const opts=[correct,...wrong].sort(()=>Math.random()-0.5);
      document.getElementById('choices').innerHTML='';
      opts.forEach(o=>{
        const b=document.createElement('button');
        b.className='btn sm';
        b.textContent=o;
        b.onclick=()=>{

            highlightCodeLine(4);
            popped.push(stack.pop());
            draw();
            document.getElementById('fb').className='feedback win';
            document.getElementById('fb').textContent=`✓ Correct! ${o} was on top. LIFO means the LAST pushed element is the FIRST to pop.`;
            if(stack.length===0){
              setTimeout(()=>{
                document.getElementById('fb').textContent=`🏆 Perfect! Full pop order: ${popped.join(' → ')}. Stack is now empty.`;
                setTimeout(()=>clearMission(id,key,90,45),1400);
              },600);
            }
          } else {
            mistakes++; shakeScreen();
            document.getElementById('fb').className='feedback lose';
            document.getElementById('fb').textContent=`✗ Wrong! The TOP of the stack is ${correct}, not ${o}. Think LIFO — top = most recent push. Mistakes: ${mistakes}.`;
          }
        };
        document.getElementById('choices').appendChild(b);
      });
    }
  }
  draw();
}

/* Stack falling stones */
function stackStones(id,key){
  const seq=randArr(5,9); let stack=[], idx=0, expectPop=[...seq].reverse();
  arenaShell('Falling Stones','Push all stones, then pop them — LIFO order.',`
    <div class="prompt" id="pr"></div>
    <div style="display:flex;flex-direction:column-reverse;align-items:center;gap:6px;min-height:200px;justify-content:flex-start" id="stk"></div>
    <div class="controls"><button class="btn sm" id="push">⬇ Push next stone</button><button class="btn sm purple" id="pop">⬆ Pop top</button></div>
    <div class="feedback" id="fb"></div>`);
  const draw=()=>{
    document.getElementById('stk').innerHTML=stack.map(v=>`<div class="acell"><div class="box" style="border-color:var(--green)">${v}🪨</div></div>`).join('');
    document.getElementById('pr').innerHTML=idx<seq.length?`Stones to push: <b>${seq.slice(idx).join(' ')}</b>`:`All pushed — now pop everything!`;
  };
  draw();
  document.getElementById('push').onclick=()=>{
    if(idx<seq.length){
      const val=seq[idx++];
      highlightCodeLine(2);
      stack.push(val); draw();
      fb(`✓ Pushed stone ${val} onto the top. Stacks are LIFO (Last In, First Out) — elements stack vertically. Current: [${stack.join(' ← ')}].`, true);
    }else fb('✗ Stack input complete — start popping elements!',false);
  };
  document.getElementById('pop').onclick=()=>{
    if(!stack.length){fb('✗ Underflow! You cannot pop from an empty stack because there are no elements to retrieve.',false);return;}
    highlightCodeLine(4);
    const v=stack.pop(); const want=expectPop.shift();
    draw();
    if(idx<seq.length){fb(`✓ Popped top stone ${v}. Popping removes the most recently pushed element first. Stack: [${stack.join(' ← ')}].`,true);}
    else if(stack.length===0){fb(`✓ Emptied in perfect LIFO order! All elements popped from top to bottom.`,true);setTimeout(()=>clearMission(id,key,80,40),1500);}
    else {fb(`✓ Popped top stone ${v} (LIFO order). Stack: [${stack.join(' ← ')}].`,true);}
  };
  function fb(m,ok){const f=document.getElementById('fb');f.className='feedback '+(ok?'win':'lose');f.textContent=m;}
}
/* Grow BST */
function growBST(id,key){
  const vals=[...new Set(randArr(7,40))]; let root=null, idx=0;
  arenaShell('Grow the BST','Insert each value. Left if smaller, right if larger.',`
    <div class="prompt" id="pr"></div>
    <div id="tree" style="min-height:240px;display:flex;justify-content:center;align-items:flex-start;margin-top:10px"></div>
    <div class="controls"><button class="btn sm green" id="auto">🌱 Insert next</button></div>
    <div class="feedback" id="fb"></div>`);
  const ins=(node,v)=>{if(!node)return{v,l:null,r:null};if(v<node.v)node.l=ins(node.l,v);else node.r=ins(node.r,v);return node;};
  function render(node){if(!node)return '';
    return `<div style="display:flex;flex-direction:column;align-items:center;margin:0 6px">
      <div class="acell"><div class="box" style="border-color:var(--green)">${node.v}</div></div>
      <div style="display:flex">${render(node.l)}${render(node.r)}</div></div>`;}
  const draw=()=>{document.getElementById('tree').innerHTML=root?render(root):'<span class="dim">empty tree</span>';
    document.getElementById('pr').innerHTML=idx<vals.length?`Insert <b>${vals[idx]}</b> (${idx+1}/${vals.length})`:'Tree complete!';};
  draw();
  document.getElementById('auto').onclick=()=>{
    if(idx<vals.length){
      const val=vals[idx++];
      const path=[];
      let curr=root;
      while(curr){
        path.push(curr.v);
        if(val<curr.v) curr=curr.l;
        else curr=curr.r;
      }
      if (path.length === 0) highlightCodeLine(2);
      else if (val < path[path.length - 1]) highlightCodeLine(3);
      else highlightCodeLine(4);
      root=ins(root,val); draw();
      const pathStr = path.length > 0 ? `Path: ${path.join(' → ')} → (placed ${val})` : `Root created: ${val}`;
      document.getElementById('fb').className='feedback win';
      document.getElementById('fb').textContent=`✓ ${pathStr}. Binary Search Tree rule: values smaller branch left, larger branch right. Average insert is O(log n).`;
      
      if(idx>=vals.length){
        setTimeout(()=>{
          document.getElementById('fb').className='feedback win';
          document.getElementById('fb').textContent='BST grown successfully — left < root < right rule satisfied everywhere!';
          setTimeout(()=>clearMission(id,key,90,45),1000);
        }, 1500);
      }
    }
  };
}
/* Traffic FIFO */
function trafficFIFO(id,key){
  let q=randArr(5,9); const order=[...q];
  arenaShell('Traffic Control','Cars must leave in arrival order — pure FIFO.',`
    <div class="prompt">Dequeue the car at the <b>front</b> (left) each time.</div>

/* g3b — Postfix Forge: evaluate postfix expression using a visual stack */
function postfixForge(id,key){
  // Generate a valid postfix expression: a b + c * style
  const a=2+Math.floor(Math.random()*6), b=2+Math.floor(Math.random()*6), c=2+Math.floor(Math.random()*5);
  const tokens = [String(a), String(b), '+', String(c), '*'];
  const answer = (a+b)*c;
  let ti=0, stack=[];
  arenaShell('Postfix Forge','Evaluate the postfix expression using the stack — push numbers, pop & compute on operators.',`
    <div class="prompt" id="pr">Expression: <b style="font-family:var(--mono);color:var(--gold)">${tokens.join('  ')}</b></div>
    <div style="display:flex;gap:20px;align-items:flex-start;justify-content:center;margin:12px 0">
      <div style="text-align:center">
        <div class="eyebrow" style="font-size:10px">Tokens</div>
        <div id="tok-row" style="display:flex;gap:6px;flex-wrap:wrap;justify-content:center;margin-top:6px"></div>
      </div>
      <div style="text-align:center">
        <div class="eyebrow" style="font-size:10px">Stack (top→)</div>
        <div id="stk-row" style="display:flex;gap:6px;flex-wrap:wrap;justify-content:center;min-height:44px;margin-top:6px"></div>
      </div>
    </div>
    <div class="controls"><button class="btn sm green" id="nxt">▶ Process Next Token</button></div>
    <div class="feedback" id="fb"></div>`);
  function draw(){
    const tr=document.getElementById('tok-row');
    tr.innerHTML=tokens.map((t,i)=>`<div class="acell"><div class="box" style="border-color:${i<ti?'var(--dim)':i===ti?'var(--gold)':'var(--line)'};font-size:15px">${t}</div></div>`).join('');
    const sr=document.getElementById('stk-row');
    sr.innerHTML=stack.length?stack.map(v=>`<div class="acell"><div class="box" style="border-color:var(--green)">${v}</div></div>`).join(''):'<span class="dim">empty</span>';
  }
  draw();
  document.getElementById('nxt').onclick=()=>{
    if(ti>=tokens.length) return;
    const t=tokens[ti++];
    const fb=document.getElementById('fb');
    if(!isNaN(t)){
      highlightCodeLine(2);
      stack.push(Number(t));
      fb.className='feedback win';
      fb.textContent=`✓ Pushed ${t} → stack: [${stack.join(', ')}]. Numbers always go onto the stack.`;
    } else {
      highlightCodeLine(4);
      const b2=stack.pop(), a2=stack.pop();
      const res = t==='+'?a2+b2:t==='-'?a2-b2:t==='*'?a2*b2:Math.floor(a2/b2);
      stack.push(res);
      fb.className='feedback win';
      fb.textContent=`✓ Operator '${t}': popped ${a2} and ${b2}, computed ${a2}${t}${b2}=${res}, pushed result. Stack: [${stack.join(', ')}].`;
    }
    draw();
    if(ti>=tokens.length){
      document.getElementById('nxt').disabled=true;
      setTimeout(()=>{
        fb.className='feedback win';
        fb.textContent=`🏆 Final answer: ${stack[0]} (= ${answer}). Postfix evaluation uses a stack — no parentheses needed!`;
        setTimeout(()=>clearMission(id,key,90,45),1500);
      },600);
    }
  };
}

/* g4b — Priority Dispatch: always dequeue the HIGHEST priority item */
function priorityDispatch(id,key){
  const EMOJIS=['🚑','🚒','🚓','🚐','🚗'];
  const labels=['Ambulance','Fire Truck','Police','Bus','Car'];
  let items=[...Array(5)].map((_,i)=>({label:labels[i],icon:EMOJIS[i],pri:5-i}));
  // shuffle
  for(let i=items.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[items[i],items[j]]=[items[j],items[i]];}
  let mistakes=0;
  arenaShell('Priority Dispatch','Always dispatch the vehicle with the HIGHEST priority number first.',`
    <div class="prompt">Click the <b>highest priority</b> vehicle to dispatch it first.</div>
    <div id="pq" style="display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin:14px 0"></div>
    <div class="feedback" id="fb"></div>`);
  function draw(){
    const pq=document.getElementById('pq');
    pq.innerHTML='';
    items.forEach((it,i)=>{
      const d=document.createElement('div');
      d.style.cssText='display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer';
      d.innerHTML=`<div class="box" style="font-size:22px;padding:12px;border-color:var(--gold)">${it.icon}</div>
        <div style="font-size:11px;font-family:var(--mono);color:var(--txt)">${it.label}</div>
        <div style="font-size:10px;color:var(--blue)">Priority: ${it.pri}</div>`;
      d.onclick=()=>{
        const maxPri=Math.max(...items.map(x=>x.pri));
        if(it.pri===maxPri){
          highlightCodeLine(4);
          items.splice(i,1);
          draw();
          const fb=document.getElementById('fb');
          fb.className='feedback win';
          fb.textContent=`✓ Dispatched ${it.label} (priority ${it.pri}) — highest priority exits first in a Priority Queue.`;
          if(items.length===0){
            setTimeout(()=>clearMission(id,key,85,42),1200);
          }
        } else {
          mistakes++; shakeScreen();
          document.getElementById('fb').className='feedback lose';
          document.getElementById('fb').textContent=`✗ Not the highest! Priority Queue always serves the MAX priority (${maxPri}) first. Mistakes: ${mistakes}.`;
        }
      };
      document.getElementById('pq').appendChild(d);
    });
  }
  draw();
}

/* g5b — Inorder Walk: click BST nodes in left→root→right order */
function inorderWalk(id,key){
  // Build a simple fixed BST so we can show it nicely
  const vals=[5,3,7,2,4,6,8];
  // BST structure: 5 is root, left subtree 3(2,4), right subtree 7(6,8)
  const tree={v:5,l:{v:3,l:{v:2,l:null,r:null},r:{v:4,l:null,r:null}},r:{v:7,l:{v:6,l:null,r:null},r:{v:8,l:null,r:null}}};
  const correct=[2,3,4,5,6,7,8]; // inorder sequence
  let clicked=[], mistakes=0;
  arenaShell('Inorder Walk','Click BST nodes in Inorder order: Left → Root → Right.',`
    <div class="prompt">Inorder traversal visits: <b style="color:var(--gold)">Left → Root → Right</b>. Click nodes in that order.</div>
    <div id="bst-disp" style="display:flex;justify-content:center;margin:14px 0"></div>
    <div style="font-family:var(--mono);font-size:12px;text-align:center;color:var(--dim);margin-bottom:8px">Your order so far: <span id="seq" style="color:var(--green)">—</span></div>
    <div class="feedback" id="fb"></div>`);
  function renderTree(node,depth=0){
    if(!node)return '<div style="width:44px"></div>';
    const isDone=clicked.includes(node.v);
    const isNext=!isDone && node.v===correct[clicked.length];
    return `<div style="display:flex;flex-direction:column;align-items:center;gap:4px">
      <div class="acell" onclick="walkClick(${node.v})">
        <div class="box" style="cursor:pointer;border-color:${isDone?'var(--green)':isNext?'var(--gold)':'var(--line)'};background:${isDone?'rgba(0,255,128,0.08)':'transparent'}">${node.v}</div>
      </div>
      <div style="display:flex;gap:8px">${renderTree(node.l,depth+1)}${renderTree(node.r,depth+1)}</div>
    </div>`;
  }
  window.walkClick=function(v){
    const fb=document.getElementById('fb');
    if(v===correct[clicked.length]){
      highlightCodeLine(4);
      clicked.push(v);
      document.getElementById('seq').textContent=clicked.join(' → ');
      document.getElementById('bst-disp').innerHTML=renderTree(tree);
      fb.className='feedback win';
      fb.textContent=`✓ Visited ${v}. Inorder rule: always go leftmost first, then root, then right.`;
      if(clicked.length===correct.length){
        setTimeout(()=>{
          fb.textContent='🏆 Perfect inorder traversal! Result is always sorted for a BST.';
          setTimeout(()=>clearMission(id,key,90,45),1200);
        },500);
      }
    } else if(!clicked.includes(v)){
      mistakes++; shakeScreen();
      fb.className='feedback lose';
      fb.textContent=`✗ Wrong! Expected ${correct[clicked.length]} next. Remember: go Left first, then Root, then Right. Mistakes: ${mistakes}.`;
    }
  };
  document.getElementById('bst-disp').innerHTML=renderTree(tree);
}

function getUnrepeatedQuestions(id, countNeeded) {

    mk(`In a priority queue the next element out is…`,'The highest priority, not the earliest',['Always the first enqueued','The most recent','A random one']);
    mk(`Enqueue adds at the ___, dequeue removes from the ___.`,'rear; front',['front; rear','top; top','middle; middle']);
    
    mk(`Which traversal algorithm on graphs uses a queue as its primary helper structure?`,'Breadth-First Search (BFS)',['Depth-First Search (DFS)','Dijkstra\'s algorithm','Kruskal\'s algorithm']);
    mk(`If elements 'A', 'B', 'C' are enqueued in that order, what does the first dequeue return?`,"'A'",["'B'", "'C'", "Null"]);
    mk(`In a circular queue of capacity 5, front is at index 2 and rear is at index 4. After enqueuing one element, where is rear?`,'Index 0 (wraps around)',['Index 5','Index 1','Index 3']);
    mk(`What is the worst-case time complexity of enqueueing an element into a binary max-heap priority queue of size n?`,'O(log n)',['O(1)','O(n)','O(n log n)']);
    mk(`Which queue variation allows insertion and deletion at both ends?`,'Double-ended queue (Deque)',['Circular queue','Priority queue','Dynamic queue']);
  }
  if(id===5){
    mk(`In a BST, an inorder traversal visits nodes in…`,'Sorted ascending order',['Reverse level order','Insertion order','Random order']);
    mk(`Searching a balanced BST of n nodes is about…`,'O(log n)',['O(n)','O(n log n)','O(1)']);
    mk(`An AVL tree stays balanced using…`,'Rotations after insert/delete',['Random shuffling','Hashing keys','Doubling capacity']);
    mk(`A max-heap guarantees…`,'Parent ≥ both children',['Left < parent < right','Sorted array layout','No duplicates']);
    
    const height = 2 + Math.floor(Math.random()*3);
    const maxLeaves = Math.pow(2, height);
    mk(`A binary tree has a height of ${height} (where root has height 0). What is the maximum number of leaf nodes it can have?`, String(maxLeaves),
       [String(maxLeaves - 1), String(maxLeaves / 2), String(maxLeaves * 2)]);

    mk(`If you insert values 5, 3, 7, 2, 4 in order into an empty BST, what is the right child of 3?`,'4',['2','5','7']);
    mk(`In a complete binary tree of n nodes stored in an array, what is the index of the parent of node i (i > 0)?`,'Math.floor((i - 1) / 2)',['i / 2','2 * i + 1','2 * i + 2']);
    mk(`What is the main advantage of a Red-Black Tree over a standard Binary Search Tree?`,'It guarantees O(log n) operations by keeping the tree balanced',['It uses less memory per node','It sorts elements automatically','It runs in O(1) search time']);
    mk(`In a binary min-heap, where is the minimum element always located?`,'At the root (index 0)',['At the last leaf','At a random leaf','At index 1 or 2 depending on size']);
  }
  if(id===6){
    mk(`BFS explores a graph using a…`,'Queue',['Stack','Priority by value','Recursion only']);
    mk(`DFS naturally uses a…`,'Stack / recursion',['Queue','Min-heap','Hash map only']);
    mk(`Dijkstra finds the…`,'Cheapest weighted shortest path',['Path with fewest nodes only','A random path','The longest path']);
    mk(`Shortest path in an UNWEIGHTED graph is found by…`,'BFS',['DFS','Bubble sort','Binary search']);
    
    mk(`If a graph has V vertices and E edges, what is the space complexity of its adjacency matrix representation?`,'O(V²)',['O(V + E)','O(V * E)','O(E)']);
    mk(`Which algorithm is best suited to find cycles in a directed graph?`,'Depth-First Search (DFS)',['Breadth-First Search (BFS)','Dijkstra\'s algorithm','Kruskal\'s algorithm']);
    mk(`Dijkstra's algorithm fails or may give incorrect results under which condition?`,'Negative edge weights',['Directed edges','Unweighted edges','More than 100 nodes']);
    mk(`What is the time complexity of topological sort on a directed acyclic graph (DAG) with V vertices and E edges?`,'O(V + E)',['O(V * E)','O(V log V)','O(V²)']);
    mk(`An adjacency list of a graph with V vertices and E undirected edges uses how many list nodes in total?`,'2E nodes',['E nodes','V nodes','V + E nodes']);
  }
  if(id===7){
    return [...questionBank(1),...questionBank(2),...questionBank(3),...questionBank(4),...questionBank(5),...questionBank(6)]
      .sort(()=>Math.random()-.5);
  }
  return Q.sort(()=>Math.random()-.5);
}

window.startQuiz=startQuiz;
function startQuiz(id){
  const o=WORLDS.find(w=>w.id===id);
  let qs=getUnrepeatedQuestions(id, 5).slice(0,5);
  if(qs.length<5){while(qs.length<5)qs=qs.concat(questionBank(id));qs=qs.slice(0,5);}
  let qi=0, correct=0, timer, tleft;

  // --- Dynamic overall time limit based on difficulty ---
  // World 1 = Easy (30s/q), 2-3 = Medium (40s/q), 4-5 = Hard (50s/q), 6-7 = Expert (60s/q)
  const DIFFICULTY_SECS = { 1:30, 2:40, 3:40, 4:50, 5:50, 6:60, 7:60 };
  const DIFFICULTY_LABEL = { 1:'🟢 Easy', 2:'🟡 Medium', 3:'🟡 Medium', 4:'🟠 Hard', 5:'🟠 Hard', 6:'🔴 Expert', 7:'🔴 Expert' };
  const secsPerQ = DIFFICULTY_SECS[id] || 40;
  const overallLimit = secsPerQ * qs.length; // e.g. 5 × 30 = 150s for World 1
  let overallLeft = overallLimit;

  if(overallTimerInterval) clearInterval(overallTimerInterval);
  const overallStartTime = Date.now();

  // Tick every second for the overall countdown
  overallTimerInterval = setInterval(()=>{
    overallLeft = overallLimit - Math.floor((Date.now() - overallStartTime) / 1000);
    if(overallLeft < 0) overallLeft = 0;
    const el = document.getElementById('overall-tm');
    if(el){
      const mins = Math.floor(overallLeft / 60);
      const secs = overallLeft % 60;
      const display = mins > 0 ? `${mins}m ${secs < 10 ? '0' : ''}${secs}s` : `${secs}s`;
      el.textContent = `⏱️ ${display} left`;
      // Danger mode: below 25% remaining → go red + pulse
      const pctLeft = overallLeft / overallLimit;
      if(pctLeft <= 0.25){
        el.style.color = 'var(--pink)';
        el.style.borderColor = 'rgba(255,77,157,0.5)';
        el.style.boxShadow = '0 0 14px rgba(255,77,157,0.3)';
        el.style.animation = 'timerPulse 0.6s infinite';
      } else if(pctLeft <= 0.5){
        el.style.color = 'var(--gold)';
        el.style.borderColor = 'rgba(255,215,0,0.4)';
        el.style.boxShadow = '0 0 10px rgba(255,215,0,0.2)';
        el.style.animation = '';
      } else {
        el.style.color = 'var(--blue)';
        el.style.borderColor = 'rgba(45,212,255,0.2)';
        el.style.boxShadow = '0 0 10px rgba(45,212,255,0.1)';
        el.style.animation = '';
      }
    }
    // Overall time expired → auto-finish quiz
    if(overallLeft <= 0){
      clearInterval(overallTimerInterval); overallTimerInterval = null;
      clearInterval(timer);
      finish(true); // true = time expired
    }
  }, 1000);

  screen('quiz',`<div class="wrap">
    <button class="btn ghost sm back" onclick="go('world',${id})">← Exit</button>
    <div style="text-align:center">
      <div class="eyebrow">${o.name} · Final Quiz</div>
      <div class="h2">🧠 Scenario Trial</div>
      <div style="font-family:var(--mono);font-size:11px;color:var(--dim);margin-top:4px;letter-spacing:1px">${DIFFICULTY_LABEL[id]} · ${qs.length} Questions · ${secsPerQ}s per question</div>
    </div>
    <div class="timering"><i id="tr"></i></div>
    <div class="timer" id="tm"></div>
    <div id="overall-tm" style="position:absolute;top:18px;right:18px;z-index:5;color:var(--blue);font-family:var(--mono);font-size:14px;font-weight:bold;background:rgba(0,0,0,0.4);padding:6px 14px;border-radius:8px;border:1px solid rgba(45,212,255,0.2);box-shadow:0 0 10px rgba(45,212,255,0.1);margin:0;transition:color 0.4s,border-color 0.4s,box-shadow 0.4s">⏱️ ${Math.floor(overallLimit/60)}m ${overallLimit%60}s left</div>
    <div id="qbody"></div>
  </div>`);
  function next(){
    if(qi>=qs.length)return finish();
    const item=qs[qi];
    if(!S.answeredQuestions[id]) S.answeredQuestions[id] = [];
    if(!S.answeredQuestions[id].includes(item.q)){
      S.answeredQuestions[id].push(item.q);
      save();
    }
    const area=document.getElementById('qbody');
    area.innerHTML=`<div class="qbox glass" style="padding:24px">
      <div class="eyebrow">Question ${qi+1}/${qs.length}</div>
      <p style="font-size:18px;margin:12px 0">${item.q}</p>
      <div class="opts">${item.opts.map((o,k)=>`<button class="opt" data-k="${k}">${o}</button>`).join('')}</div>
    </div>`;
    area.querySelectorAll('.opt').forEach(b=>b.onclick=()=>answer(+b.dataset.k,item,area));
    tleft=90; tick(); clearInterval(timer); timer=setInterval(tick,1000);
  }
  function tick(){document.getElementById('tm').textContent='⏱ '+tleft+'s';
    document.getElementById('tr').style.width=(tleft/90*100)+'%';
    if(tleft<=0){clearInterval(timer);reveal(-1);return;} tleft--;}
  function answer(k,item,area){clearInterval(timer);reveal(k);}
  function reveal(k){
    const item=qs[qi]; const area=document.getElementById('qbody');
    const opts=area.querySelectorAll('.opt'); opts.forEach(x=>x.disabled=true);
    if(k===item.a){opts[k].classList.add('right');correct++;}
    else{if(k>=0)opts[k].classList.add('wrong');opts[item.a]&&opts[item.a].classList.add('right');}
    qi++; setTimeout(next,900);
  }
  function finish(timeExpired){
    clearInterval(timer);
    if(overallTimerInterval) { clearInterval(overallTimerInterval); overallTimerInterval = null; }
    const finalTime = (Date.now() - overallStartTime) / 1000;
    const pct=Math.round(correct/qs.length*100);
    const passed=pct>=70 && !timeExpired;
    if(pct>S.worlds[id].quiz)S.worlds[id].quiz=pct;
    if(pct>S.stats.quizBest)S.stats.quizBest=pct;
    if(pct===100 && !timeExpired)unlock('flawless');
    if(id===1)unlock('quiz1');
    addXP(passed?120:40); addCoins(passed?60:15);
    if(passed){
      completeWorld(id);
      if(!S.stats.totalQuizTime) S.stats.totalQuizTime = 0;
      if(!S.stats.quizzesCleared) S.stats.quizzesCleared = 0;
      S.stats.totalQuizTime += finalTime;
      S.stats.quizzesCleared += 1;
      save();
    }
    const icon = timeExpired ? '⏰' : passed ? '🏆' : '📚';
    const headline = timeExpired ? `<div style="color:var(--pink);font-size:13px;font-family:var(--mono);letter-spacing:1px;margin-bottom:4px">⏰ TIME'S UP!</div>` : '';
    const subtext = timeExpired
      ? `Time limit of ${overallLimit}s (${DIFFICULTY_LABEL[id]}) expired. ${correct}/${qs.length} answered. Need 70% to pass.`
      : `${correct}/${qs.length} correct · ${passed?'World conquered!':'Need 70% to pass — try again.'}`;
    modal(`<div class="loot">${icon}</div>
      ${headline}
      <div class="eyebrow">Quiz Result</div>
      <div class="big">${pct}%</div>
      <p class="dim">${subtext}</p>
      <div style="font-family:var(--mono);font-size:11px;color:var(--dim);margin:6px 0">${DIFFICULTY_LABEL[id]} · Limit: ${Math.floor(overallLimit/60)}m ${overallLimit%60}s · Finished in: ${finalTime.toFixed(1)}s</div>
      <div class="rewardrow"><span class="chip">+${passed?120:40} XP</span><span class="chip">+${passed?60:15} 🪙</span></div>
      <button class="btn green" onclick="closeModal();go('${passed?'map':'world'}'${passed?'':','+id})">${passed?'Return to Map':'Try Again'}</button>`);
  }
  next();
}

  const botFiltered = bots.filter(b=>!poolArr.find(p=>p.name===b.name));
  return [...botFiltered,...poolArr].sort((a,b)=>a.time-b.time);
}

window.buyBook = function(id) {
  const b = BOOKS.find(x => x.id === id);
  if (!b) return;
  if (S.coins < b.cost) {
    toast('❌', 'Insufficient Coins', 'Collect more coins by completing roadmaps, missions, and quizzes!');
    return;
  }
  S.coins -= b.cost;
  S.inv.push(id);
  save();
  toast('📚', 'Book Purchased', `Unlocked ${b.title}! Read it in the Shop bookshelf.`);
  renderShop();
  refreshHUD();
};

window.readBook = function(id, page = 0) {
  const b = BOOKS.find(x => x.id === id);
  if (!b) return;
  const maxPages = b.pages.length;
  const pageIdx = Math.max(0, Math.min(page, maxPages - 1));
  const content = b.pages[pageIdx];
  modal(`<div style="padding:14px; max-width:480px; text-align:center; min-height:380px; display:flex; flex-direction:column; justify-content:space-between">
    <div>
      <div style="font-size:52px; margin-bottom:10px">${b.icon}</div>
      <div style="min-height:240px; display:flex; flex-direction:column; justify-content:center">${content}</div>
    </div>
    <div style="margin-top:20px; display:flex; justify-content:space-between; align-items:center; border-top:1px solid var(--line); padding-top:10px">
      <button class="btn sm ghost" ${pageIdx === 0 ? 'disabled' : ''} onclick="readBook('${id}', ${pageIdx - 1})">◀ Prev Page</button>
      <span style="font-family:var(--mono); font-size:12px; color:var(--gold)">Page ${pageIdx + 1} of ${maxPages}</span>
      <button class="btn sm" ${pageIdx === maxPages - 1 ? 'disabled' : ''} onclick="readBook('${id}', ${pageIdx + 1})">Next Page ▶</button>
    </div>
    <button class="btn sm green" style="width:100%; margin-top:14px" onclick="closeModal()">Close Book</button>
  </div>`);
};

  S.chatHistory = S.chatHistory.filter(x => x.id !== chatId);

    activeChatId = S.chatHistory.length > 0 ? S.chatHistory[0].id : null;

};

window.sendGuiderPageMessage = function() {
  const input = document.getElementById('guider-page-input');
  if (!input) return;
  const text = input.value.trim();
  if (!text) return;
  
  input.value = '';
  
  const msgContainer = document.getElementById('guider-page-messages');
  if (!msgContainer) return;
  
  if (!activeChatId) {
    const newChat = {
      id: Date.now(),
      title: text.length > 25 ? text.substring(0, 25) + '...' : text,
      messages: []
    };
    S.chatHistory = S.chatHistory || [];
    S.chatHistory.unshift(newChat);
    activeChatId = newChat.id;
  }
  
  const chat = S.chatHistory.find(x => x.id === activeChatId);
  if (!chat) return;
  
  chat.messages.push({ sender: 'user', text: text });
  save();
  
  const userMsg = document.createElement('div');
  userMsg.className = 'oracle-msg user';
  userMsg.style.alignSelf = 'flex-end';
  userMsg.style.maxWidth = '80%';
  userMsg.style.padding = '12px 18px';
  userMsg.style.borderRadius = '14px';
  userMsg.style.textAlign = 'left';
  userMsg.textContent = text;
  msgContainer.appendChild(userMsg);
  
  msgContainer.scrollTop = msgContainer.scrollHeight;
  
  const typingIndicator = document.createElement('div');
  typingIndicator.className = 'oracle-typing';
  typingIndicator.id = 'guider-page-typing-indicator';
  typingIndicator.style.alignSelf = 'flex-start';
  typingIndicator.style.padding = '10px 16px';
  typingIndicator.style.borderRadius = '12px';
  typingIndicator.style.textAlign = 'left';
  typingIndicator.innerHTML = 'Guider is decoding the scrolls<span class="typing-dots">...</span>';
  msgContainer.appendChild(typingIndicator);
  
  msgContainer.scrollTop = msgContainer.scrollHeight;
  
  window.renderGuiderHistoryList();
  
  setTimeout(() => {
    const indicator = document.getElementById('guider-page-typing-indicator');
    if (indicator) indicator.remove();
    
    const responseHTML = window.processOracleQuery(text);
    
    chat.messages.push({ sender: 'oracle', text: responseHTML });
    save();
    
    const guiderMsg = document.createElement('div');
    guiderMsg.className = 'oracle-msg oracle';
    guiderMsg.style.alignSelf = 'flex-start';
    guiderMsg.style.maxWidth = '80%';
    guiderMsg.style.padding = '14px 20px';
    guiderMsg.style.borderRadius = '14px';
    guiderMsg.innerHTML = responseHTML;
    msgContainer.appendChild(guiderMsg);
    
    msgContainer.scrollTop = msgContainer.scrollHeight;
  }, 1000);
};

window.processOracleQuery = function(query) {
  const lower = query.toLowerCase().trim();
  const clean = lower.replace(/[^\w\s\-\+]/g, ' ');
  
  const dsaGeneralKeywords = [
    'dsa', 'data structures', 'data structure', 'algorithm', 'algorithms', 'runtime', 
    'space complexity', 'time complexity', 'big o', 'complexity', 'dijkstra', 'bst', 
    'avl', 'recursion', 'backtracking', 'dynamic programming', 'greedy', 'sorting', 
    'searches', 'linear search', 'binary search', 'hashing', 'pointer', 'node', 
    'vertex', 'edge', 'path', 'cycle', 'tree', 'trie', 'rb-tree', 'kahn', 'topological',
    'stack', 'queue', 'heap', 'list', 'array', 'graph', 'sort'
  ];
  
  const allKeywords = new Set(dsaGeneralKeywords);
  ORACLE_RESPONSES.forEach(resp => {
    resp.keys.forEach(k => allKeywords.add(k));
  });
  
  let isDSARelated = false;
  for (let kw of allKeywords) {
    if (clean.includes(kw)) {
      isDSARelated = true;
      break;
    }
  }
  
  if (!isDSARelated) {
    return `<div style="color:var(--red); font-weight:bold; margin-bottom:6px; text-align:left">🔮 ACCESS DENIED: NON-DSA ANOMALY</div>
            I am the <b>Guider</b>, forged to resolve doubts on Data Structures & Algorithms. Your query lies outside my archives.<br><br>
            Please focus your inquiries on <b>Arrays, Lists, Stacks, Queues, Trees, Graphs, Sorting, or Complexity</b>.`;
  }
  
  let matches = [];
  ORACLE_RESPONSES.forEach(resp => {
    let matchCount = 0;
    resp.keys.forEach(k => {
      if (clean.includes(k)) {
        matchCount++;
      }
    });
    if (matchCount > 0) {
      matches.push({ resp, score: matchCount });
    }
  });
  
  matches.sort((a, b) => b.score - a.score);
  
  if (matches.length > 0) {
    const best = matches[0].resp;
    const escapedCode = best.code
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#039;");
      
    const formatText = (txt) => {
      if (!txt) return '';
      return txt
        .replace(/\*\*(.*?)\*\*/g, '<b>$1</b>')
        .replace(/`(.*?)`/g, '<code style="font-family:var(--mono); color:var(--gold); background:rgba(255,255,255,0.05); padding:2px 4px; border-radius:4px">$1</code>');
    };
      
    return `
      <div style="color:var(--blue); font-weight:bold; border-bottom:1px solid rgba(45,212,255,0.2); padding-bottom:6px; margin-bottom:12px; font-size:16px; font-family:var(--display); text-align:left">
        ${best.title}
      </div>
      
      <div style="margin-bottom:12px; font-size:13.5px; color:#fff; line-height:1.5; text-align:left">
        ${formatText(best.desc)}
      </div>
      
      <div style="background:rgba(177,77,255,0.05); border-left:4px solid #b14dff; padding:12px 16px; border-radius:6px; margin-bottom:12px; font-size:13px; line-height:1.5; text-align:left">
        ${formatText(best.analogy)}
      </div>
      
      <div style="background:rgba(45,212,255,0.05); border-left:4px solid #2dd4ff; padding:12px 16px; border-radius:6px; margin-bottom:12px; font-size:13px; line-height:1.5; text-align:left">
        ${formatText(best.simplified).replace(/\n/g, '<br>')}
      </div>
      
      <div style="background:rgba(255,215,0,0.05); border-left:4px solid var(--gold); padding:12px 16px; border-radius:6px; margin-bottom:12px; font-size:13px; line-height:1.5; text-align:left; font-family:var(--body)">
        ${formatText(best.complexity).replace(/\n/g, '<br>')}
      </div>
      
      <div style="font-family:var(--mono); font-size:11px; color:var(--dim); margin-bottom:6px; text-align:left">📜 CODING SCROLL:</div>
      <pre style="background:rgba(0,0,0,0.4); padding:12px 16px; border-radius:8px; border:1px solid var(--line); font-family:var(--mono); font-size:11px; overflow-x:auto; margin:0; color:#b3e5fc; line-height:1.5; text-align:left">${escapedCode}</pre>
    `;
  }
  
  return `
    <div style="color:var(--blue); font-weight:bold; margin-bottom:6px; text-align:left">🔮 DSA ARCHIVE DETECTED</div>
    I recognized a DSA topic in your query, but I don\'t have a specific blueprint for it yet. <br><br>
    Try asking about: <b>Arrays, Lists, Stacks, Queues, Trees, Graphs, Sorting, or Complexity</b> (e.g. "Dijkstra", "AVL", "Big O").
  `;
};

    "    if (arr[j] > arr[j + 1]) { // Compare",
    "      swap(arr, j, j + 1); // Swap",
    "    }",
    "  }",
    "}"
  ],
  selection: [
    "// Selection Sort Algorithm",
    "for (let i = 0; i < n; i++) {",
    "  let minIdx = i;",
    "  for (let j = i + 1; j < n; j++) {",
    "    if (arr[j] < arr[minIdx]) minIdx = j; // Scan min",
    "  }",
    "  swap(arr, i, minIdx); // Swap to correct place",
    "}"
  ],
  insertion: [
    "// Insertion Sort Algorithm",
    "for (let i = 1; i < n; i++) {",
    "  let key = arr[i], j = i - 1; // Select key",
    "  while (j >= 0 && arr[j] > key) {",
    "    arr[j + 1] = arr[j]; // Shift items right",
    "    j--;",
    "  }",
    "  arr[j + 1] = key; // Place key",
    "}"
  ],
  merge: [
    "// Merge Sort: Divide & Conquer",
    "function mergeSort(arr, l, r) {",
    "  if (r - l <= 1) return;",
    "  let m = Math.floor((l + r) / 2); // Midpoint",
    "  mergeSort(arr, l, m); // Sort left half",
    "  mergeSort(arr, m, r); // Sort right half",
    "  merge(arr, l, m, r); // Merge sorted halves",
    "}"
  ]
};

function initHologramVisualizer(containerId, worldId) {
  const container = document.getElementById(containerId);
  if (!container) return;
  if (container._timer) clearInterval(container._timer);

  if (containerId === 'mission-hologram' && activeMissionKey && MISSION_CODES[activeMissionKey]) {
    const codeLines = MISSION_CODES[activeMissionKey];
    container.innerHTML = `
      <div class="hologram-scanline"></div>
      <div class="hologram-caption" style="margin-bottom:8px; font-weight:bold; color:var(--green)">⚡ CODE TRACE:</div>
      <pre class="code-visualizer" id="holo-code-pre" style="font-family:var(--mono); font-size:12px; background:rgba(0,0,0,0.4); border:1px solid var(--line); padding:12px; border-radius:8px; overflow-x:auto; overflow-y:auto; flex-grow:1; height:calc(100% - 28px); color:#fff; line-height:1.6; text-align:left; white-space:pre-wrap; word-break:break-all; margin:0">${codeLines.map((l, i) => `<span class="line" data-line="${i}" style="display:block; padding:0 4px; transition:all 0.2s">${syntaxHighlight(l)}</span>`).join('')}</pre>
    `;
    return;
  }

  container.innerHTML = `
    <div class="hologram-scanline"></div>
    <div class="hologram-canvas-container" id="${containerId}-canvas"></div>
    <div class="hologram-caption" id="${containerId}-caption">Initializing Hologram...</div>
  `;

  const canvas = document.getElementById(containerId + '-canvas');
  const caption = document.getElementById(containerId + '-caption');
  if (!canvas || !caption) return;

  if (worldId === 1) {
    let step = 0;
    const items = [15, 34, 9, 82, 45, 60];
    const draw = (hlIdx = -1, isInserting = false, isDeleting = false) => {
      canvas.innerHTML = `
        <div class="holo-array-container">
          ${items.map((val, i) => {
            let cls = '';
            if (i === hlIdx) cls = 'hl';
            if (isInserting && i >= 2) cls += ' shift';
            return `
              <div class="holo-array-cell">
                <div class="holo-array-box ${cls}">${val}</div>
                <div class="holo-array-idx">[${i}]</div>
              </div>
            `;
          }).join('')}
        </div>
      `;
    };
    const run = () => {
      if (step === 0) {
        caption.textContent = "Random Access: arr[3] -> jump to memory address instantly (O(1))";
        draw(3);
        step = 1;
      } else if (step === 1) {
        caption.textContent = "Insertion at index 2: Shift subsequent items right (O(n))";
        draw(2, true);
        step = 2;
      } else if (step === 2) {
        caption.textContent = "Insert complete: Value placed in new slot";
        items.splice(2, 0, 99);
        items.pop();
        draw(2);
        step = 3;
      } else if (step === 3) {
        caption.textContent = "Deletion at index 3: Shift subsequent items left (O(n))";
        draw(3, false, true);
        step = 4;
      } else {
        caption.textContent = "Deletion complete: Contiguous memory maintained";
        items.splice(3, 1);
        items.push(60);
        draw(-1);
        step = 0;
      }
    };
    run();
    container._timer = setInterval(run, 2800);
  }
  else if (worldId === 2) {
    let step = 0;
    const draw = () => {
      if (step === 0) {
        caption.textContent = "Singly Linked List: Nodes connected sequentially via 'next' pointers";
        canvas.innerHTML = `
          <div class="holo-node" style="left: 15%; top: 40%">A</div>
          <div class="holo-arrow" style="left: 28%; top: 50%; width: 45px; transform: rotate(0deg)"></div>

        <b>🧠 THEORY CHEAT SHEET:</b><br>

    6: `<b>🎮 HOW TO PLAY THE MISSIONS:</b><br>
        • <b>BFS Wave:</b> Click nodes layer-by-layer starting from the root (Breadth-First Search).<br>
        • <b>DFS Dive:</b> Plunge down a single path to its deepest leaf before backtracking (Depth-First Search).<br><br>
        <b>🧠 THEORY CHEAT SHEET:</b><br>
        • Graphs connect vertices (nodes) with edges (roads). BFS uses a queue (shortest path). DFS uses a stack/recursion. Dijkstra finds shortest weighted paths.`,
    7: `<b>🎮 HOW TO PLAY:</b><br>
        • Use all data structure rules combined. Stacks (LIFO), Queues (FIFO), Heaps (Priority), and BSTs to solve the ultimate challenges!<br><br>
        <b>🧠 THEORY CHEAT SHEET:</b><br>
        • Analyze the problem signatures: stack LIFO, queue FIFO, priority heap sorting, tree hierarchy, and graph navigation to defeat the Emperor!`
  };
  el.innerHTML = guides[worldId] || "Defeat the guardian by demonstrating algorithmic mastery!";
}

/* ======================= LOGOUT ======================= */
function logout(){
  if(confirm('Sign out and return to the landing page?')){
    clearAuth();
    localStorage.removeItem('dsa_legends_save');
    S = freshState();
    document.getElementById('app').style.display = 'none';
    document.getElementById('hud').classList.add('hidden');
    
    // Hide chatbot bubble and window
    const bubble = document.getElementById('oracle-bubble');
    const chatWin = document.getElementById('oracle-chat-window');
    if (bubble) bubble.style.display = 'none';
    if (chatWin) chatWin.classList.add('hidden');

    renderLanding();
  }
}
window.logout = logout;

/* ======================= START ======================= */
(function start(){
  initGoogleSignIn();
  const auth = getAuth();
  if(auth){
    // Already authenticated — go straight to boot
    googleUser = auth;
    const accounts = getAccounts();
    let key = '';
    if (auth.email) {
      key = "google_" + auth.email.toLowerCase();
    } else if (auth.name) {
      key = auth.name.toLowerCase();
    }
    if (key && accounts[key] && accounts[key].saveData) {
      S = accounts[key].saveData;
      localStorage.setItem('dsa_legends_save', JSON.stringify(S));
    } else {
      S = load() || freshState();
    }
    document.getElementById('landing').classList.add('hidden');
    document.getElementById('loginpage').classList.add('hidden');
    document.getElementById('app').style.display = '';
    refreshHUD();
    boot();
  } else {
    // Not authenticated — show landing page
    renderLanding();
  }
})();
</script>
